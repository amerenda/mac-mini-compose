services:
  # ============================================================
  # Technitium DNS — authoritative + ad-blocking
  # OrbStack intercepts *:53 and *:5353 (mDNS) on macOS.
  # network_mode: host lets Technitium bind directly to host ports.
  # pf-dns-redirect.sh redirects LAN DNS_IP:53 → :5354 at boot.
  # ============================================================
  technitium:
    image: technitium/dns-server:14.3.0
    container_name: technitium
    restart: unless-stopped
    network_mode: host
    environment:
      TZ: "America/New_York"
      DNS_SERVER_DOMAIN: "dns.amer.home"
      DNS_SERVER_ADMIN_PASSWORD: "${TECHNITIUM_ADMIN_PASSWORD}"
    volumes:
      - technitium-data:/etc/dns
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/127.0.0.1/5380'"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ============================================================
  # Postgres — Unified PostgreSQL instance (pgvector/pg16)
  # network_mode: host — accessible on host at 0.0.0.0:5432.
  # ============================================================
  postgres:
    image: pgvector/pgvector@sha256:7d400e340efb42f4d8c9c12c6427adb253f726881a9985d2a471bf0eed824dff
    container_name: postgres
    restart: unless-stopped
    network_mode: host
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ../postgres/init.sh:/docker-entrypoint-initdb.d/init.sh:ro
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "${MINI_POSTGRES_PASSWORD}"
      MINI_POSTGRES_TODO_PASSWORD: "${MINI_POSTGRES_TODO_PASSWORD}"
      AGENT_KB_PASSWORD: "${AGENT_KB_PASSWORD}"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ============================================================
  # MongoDB — Shared instance (port 27017)
  # network_mode: host — accessible on host at 0.0.0.0:27017.
  # ============================================================
  mongo:
    image: mongo:4.4.10
    container_name: mongo
    restart: unless-stopped
    network_mode: host
    volumes:
      - mongo-data:/data/db
      - ../mongo/init-unifi.sh:/docker-entrypoint-initdb.d/init-unifi.sh:ro
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: "${MONGO_PASSWORD}"
      MONGO_INITDB_DATABASE: unifi
    healthcheck:
      test: ["CMD", "mongo", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  technitium-data:
    external: true
    name: services_technitium-data
  postgres-data:
    external: true
    name: services_postgres-data
  mongo-data:
    external: true
    name: services_mongo-data
