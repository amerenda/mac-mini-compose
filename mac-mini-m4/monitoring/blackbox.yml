modules:
  https_2xx:
    prober: http
    timeout: 10s
    http:
      preferred_ip_protocol: ip4
      no_follow_redirects: false
      fail_if_ssl: false
      fail_if_not_ssl: true
      valid_http_versions: ["HTTP/1.1", "HTTP/2"]
      valid_status_codes: []
      tls_config:
        insecure_skip_verify: false
      headers:
        User-Agent: "blackbox-health-probe/1.0"

  tcp_connect:
    prober: tcp
    timeout: 5s
