groups:
  - name: https-probe-alerts
    rules:
      # Fires per-service when any HTTPS probe target is unreachable for >5m
      # Uses up==0 (scrape failure) because blackbox v0.28 returns content_length=-1 / probe_success=0 
      # for HTTP/2 responses without Content-Length headers, making those metrics unreliable as health signals
      - alert: WebServiceDown
        expr: probe_http_duration_seconds{job=~"https-probes.*", phase="transfer"} == 0
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "{{ $labels.instance }} ({{ $labels.service }}) is unreachable"
          description: >
            HTTPS probe to {{ $labels.instance }} has been failing for more than 5 minutes.

      # TLS cert expiring within 30 days — only when target is actually reachable 
      - alert: TLSCertExpiringSoon
        expr: probe_ssl_earliest_cert_expiry{job=~"https-probes.*"} > 0 and (time() + 30 * 86400) > probe_ssl_earliest_cert_expiry{job=~"https-probes.*"} and probe_http_duration_seconds{job=~"https-probes.*", phase="transfer"} != 0
        for: 5m
        labels:
          severity: warning

      # Cert expiring within 7 days — urgent  
      - alert: TLSCertExpiringSoonCritical
        expr: probe_ssl_earliest_cert_expiry{job=~"https-probes.*"} > 0 and (time() + 7 * 86400) > probe_ssl_earliest_cert_expiry{job=~"https-probes.*"} and probe_http_duration_seconds{job=~"https-probes.*", phase="transfer"} != 0
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "TLS cert for {{ $labels.instance }} expires in {{ $value | humanizeDuration }}"

      # RAID array has degraded — any disk failed or removed. Losing a second drive means data loss.
      - alert: RaidArrayDegraded
        expr: node_md_degraded{device="md0"} == 1 or sum(node_md_disks{device="md0",state="failed"}) > 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "RAID array md0 on {{ $labels.instance }} has degraded"
          description: |
            The RAID-5 array (md0) on {{ $labels.node }} is in a degraded state.
            Failed disk count: {{ sum(node_md_disks{device="md0",state="failed"}) | humanize }}.
            Spare disk count: {{ sum(node_md_disks{device="md0",state="spare"}) | humanize }}.
            If another drive fails, data loss will occur. Replace the failed drive immediately.

      # Array is recovering (after rebuild/replacement) — warning so you know it's happening.
      - alert: RaidRecovering
        expr: node_md_state{device="md0",state="recovering"} == 1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "RAID array md0 on {{ $labels.instance }} is recovering"
          description: |
            The RAID-5 array (md0) on {{ $labels.node }} is actively rebuilding/recovering.
            Performance will be degraded during recovery.

      # Array has spare drives — a drive was removed or replaced with an unformatted spare.
      - alert: RaidSpareDisksPresent
        expr: sum(node_md_disks{device="md0",state="spare"}) > 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Spares detected in md0 RAID array on {{ $labels.instance }}"
          description: |
            The md0 RAID-5 array has {{ $value }} spare disk(s). This could indicate a drive was removed or is being replaced.

      # Array went inactive — catastrophic failure, all data inaccessible.
      - alert: RaidInactive
        expr: node_md_state{device="md0",state="inactive"} == 1
        for: 0m
        labels:
          severity: critical
        annotations:
          summary: "RAID array md0 on {{ $labels.instance }} is INACTIVE"
          description: |
            The RAID-5 array (md0) on {{ $labels.node }} has stopped completely.
            All data on /mnt/storage may be inaccessible. Emergency action required.

      # Array resyncing — background sync after re-add or rescan, not failure-related.
      - alert: RaidResyncing
        expr: node_md_state{device="md0",state="resync"} == 1
        for: 5m
        labels:
          severity: info
        annotations:
          summary: "RAID array md0 on {{ $labels.instance }} is resyncing"
          description: |
            The RAID-5 array (md0) on {{ $labels.node }} is performing a background resync.

      # Array running a check/scrub — informational, no action needed.
      - alert: RaidChecking
        expr: node_md_state{device="md0",state="check"} == 1
        for: 5m
        labels:
          severity: info
        annotations:
          summary: "RAID array md0 on {{ $labels.instance }} is checking"
          description: |
            The RAID-5 array (md0) on {{ $labels.node }} is running a consistency check/scrub.

