global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    site: mac-mini
    role: primary

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['localhost:9093']

rule_files:
  - /etc/prometheus/rules/*.yml

# Local scrape targets — all on the Mac Mini
scrape_configs:
  - job_name: mac-mini-prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: mac-mini-node
    static_configs:
      - targets: ["localhost:9100"]

  - job_name: mac-mini-homeassistant
    metrics_path: /api/prometheus
    bearer_token_file: /etc/prometheus/ha-token
    static_configs:
      - targets: ["localhost:8123"]

  - job_name: mac-mini-postgres
    static_configs:
      - targets: ["localhost:9187"]

  - job_name: mac-mini-mongodb
    static_configs:
      - targets: ["localhost:9216"]

  - job_name: mac-mini-dns
    static_configs:
      - targets: ["localhost:9105"]

  # Komodo Core HTTPS health probe — replaces mac-mini-komodo job (port 9120 served only HTML)
  - job_name: murderbot-llama-cpp
    metrics_path: /metrics
    static_configs:
      - targets: ["10.100.20.19:8088"]
        labels:
          node: murderbot
    relabel_configs:
      # Set instance to "murderbot" so {instance=~"$host"} works in Grafana
      - target_label: instance
        replacement: murderbot

  # GPU metrics — murderbot: nvidia-exporter for GPU health (nvidia_gpu_*)
  - job_name: murderbot-nvidia
    static_configs:
      - targets: ["10.100.20.19:9101"]
        labels:
          node: murderbot

  # Server metrics — murderbot: node exporter for CPU, RAM, disk, network
  - job_name: murderbot-node
    static_configs:
      - targets: ["10.100.20.19:9100"]
        labels:
          node: murderbot

  # Cross-stack heartbeat — k3s Prometheus health probe (direct node port)
  - job_name: k3s-prometheus-heartbeat
    scheme: http
    scrape_interval: 30s
    static_configs:
      - targets: ["10.100.20.10:9090"]
        labels:
          cluster: k3s-dean

  # Blackbox exporter itself — metrics about the probe system health
  - job_name: blackbox-exporter
    static_configs:
      - targets: ["localhost:9115"]

  # HTTPS probes for core web services — one job per target to carry unique {service} labels for alerting
  - job_name: https-probes-media
    metrics_path: /probe
    params:
      module: [https_2xx]
    static_configs:
      - targets: ["media.amer.dev"]
        labels:
          stack: web-services
          service: jellyfin
    relabel_configs:
      - source_labels: [__param_target]
        target_label: instance
      - replacement: localhost:9115
        target_label: __address__

  - job_name: https-probes-komodo
    metrics_path: /probe
    params:
      module: [https_2xx]
    static_configs:
      - targets: ["komodo.amer.dev"]
        labels:
          stack: web-services
          service: komodo
    relabel_configs:
      - source_labels: [__param_target]
        target_label: instance
      - replacement: localhost:9115
        target_label: __address__

  - job_name: https-probes-argo
    metrics_path: /probe
    params:
      module: [https_2xx]
    static_configs:
      - targets: ["argo.amer.dev"]
        labels:
          stack: web-services
          service: argo-workflows
    relabel_configs:
      - source_labels: [__param_target]
        target_label: instance
      - replacement: localhost:9115
        target_label: __address__

  - job_name: https-probes-argocd
    metrics_path: /probe
    params:
      module: [https_2xx]
    static_configs:
      - targets: ["argocd.amer.dev"]
        labels:
          stack: web-services
          service: argocd
    relabel_configs:
      - source_labels: [__param_target]
        target_label: instance
      - replacement: localhost:9115
        target_label: __address__

  - job_name: https-probes-grafana
    metrics_path: /probe
    params:
      module: [https_2xx]
    static_configs:
      - targets: ["grafana.amer.dev"]
        labels:
          stack: web-services
          service: grafana
    relabel_configs:
      - source_labels: [__param_target]
        target_label: instance
      - replacement: localhost:9115
        target_label: __address__

  - job_name: https-probes-z2m
    metrics_path: /probe
    params:
      module: [https_2xx]
    static_configs:
      - targets: ["z2m-dean-1.amer.dev"]
        labels:
          stack: web-services
          service: zigbee2mqtt
    relabel_configs:
      - source_labels: [__param_target]
        target_label: instance
      - replacement: localhost:9115
        target_label: __address__
