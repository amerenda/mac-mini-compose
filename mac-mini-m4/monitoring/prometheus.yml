global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    site: mac-mini
    role: primary

# Local scrape targets — all on the Mac Mini
scrape_configs:
  - job_name: mac-mini-prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: mac-mini-node
    static_configs:
      - targets: ["node-exporter:9100"]

  - job_name: mac-mini-homeassistant
    metrics_path: /api/prometheus
    bearer_token_file: /etc/prometheus/ha-token
    static_configs:
      - targets: ["host.docker.internal:8123"]

  - job_name: mac-mini-postgres
    static_configs:
      - targets: ["postgres-exporter:9187"]

  - job_name: mac-mini-mongodb
    static_configs:
      - targets: ["mongodb-exporter:9216"]

  - job_name: mac-mini-dns
    static_configs:
      - targets: ["technitium-exporter:9105"]

  - job_name: mac-mini-komodo
    static_configs:
      - targets: ["host.docker.internal:9120"]

  # LLM metrics — murderbot: llama.cpp metrics endpoint
  - job_name: murderbot-llama-cpp
    metrics_path: /metrics
    static_configs:
      - targets: ["10.100.20.19:8088"]
        labels:
          node: murderbot
    relabel_configs:
      - source_labels: [__address__]
        regex: "([^:]+)(:\\d+)?"
        target_label: ip
      - replacement: murderbot
        target_label: instance
  # LLM metrics — murderbot: NVIDIA DCGM exporter for GPU health (nvidia_gpu_*)
  - job_name: murderbot-dcgm
    static_configs:
      - targets: ["10.100.20.19:9400"]
        labels:
          node: murderbot

  # Server metrics — murderbot: node exporter for CPU, RAM, disk, network
  - job_name: murderbot-node
    static_configs:
      - targets: ["10.100.20.19:9100"]
        labels:
          node: murderbot
