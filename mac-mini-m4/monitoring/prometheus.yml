global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    site: mac-mini
    role: primary

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['localhost:9093']

rule_files:
  - /etc/prometheus/rules/*.yml

# Local scrape targets — all on the Mac Mini
scrape_configs:
  - job_name: mac-mini-prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: mac-mini-node
    static_configs:
      - targets: ["localhost:9100"]

  - job_name: mac-mini-homeassistant
    metrics_path: /api/prometheus
    bearer_token_file: /etc/prometheus/ha-token
    static_configs:
      - targets: ["localhost:8123"]

  - job_name: mac-mini-postgres
    static_configs:
      - targets: ["localhost:9187"]

  - job_name: mac-mini-mongodb
    static_configs:
      - targets: ["localhost:9216"]

  - job_name: mac-mini-dns
    static_configs:
      - targets: ["localhost:9105"]

  - job_name: mac-mini-komodo
    static_configs:
      - targets: ["localhost:9120"]

  # LLM metrics — murderbot: llama.cpp metrics endpoint
  - job_name: murderbot-llama-cpp
    metrics_path: /metrics
    static_configs:
      - targets: ["10.100.20.19:8088"]
        labels:
          node: murderbot
    relabel_configs:
      # Set instance to "murderbot" so {instance=~"$host"} works in Grafana
      - target_label: instance
        replacement: murderbot

  # GPU metrics — murderbot: nvidia-exporter for GPU health (nvidia_gpu_*)
  - job_name: murderbot-nvidia
    static_configs:
      - targets: ["10.100.20.19:9101"]
        labels:
          node: murderbot

  # Server metrics — murderbot: node exporter for CPU, RAM, disk, network
  - job_name: murderbot-node
    static_configs:
      - targets: ["10.100.20.19:9100"]
        labels:
          node: murderbot

  # Cross-stack heartbeat — k3s Prometheus health probe (via MetalLB LoadBalancer)
  - job_name: k3s-prometheus-heartbeat
    scheme: http
    metrics_path: /-/healthy
    scrape_interval: 15s
    static_configs:
      - targets: ["10.100.20.206"]
        labels:
          cluster: k3s-dean
