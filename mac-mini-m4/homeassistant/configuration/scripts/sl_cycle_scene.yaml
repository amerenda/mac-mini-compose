sl_cycle_scene:
  alias: "SL: Cycle Scene"
  description: >
    First press: apply current window scene.
    Subsequent presses: cycle morning → day → evening → night → morning.
  mode: single
  fields:
    room:
      description: "Room identifier"
      required: true
      selector:
        text:
  sequence:
    - variables:
        windows:
          - morning
          - day
          - evening
          - night
        current_window: "{{ states('sensor.sl_current_window') }}"
        last_applied: "{{ states('input_text.sl_' ~ room ~ '_last_scene_window') }}"
        target_window: >
          {% if last_applied not in windows %}
            {{ current_window if current_window in windows else 'morning' }}
          {% else %}
            {{ windows[((windows.index(last_applied)) + 1) % 4] }}
          {% endif %}
        brightness: "{{ states('input_number.sl_' ~ room ~ '_' ~ target_window ~ '_brightness') | int(200) }}"
        ct_state: "{{ states('input_number.sl_' ~ room ~ '_' ~ target_window ~ '_color_temp') }}"
        has_ct: "{{ ct_state not in ['unknown', 'unavailable', ''] and ct_state | int(0) > 0 }}"
        ct_kelvin: "{{ (1000000 / ct_state | int) | int if has_ct else 0 }}"
        transition_secs: "{{ (states('input_number.sl_' ~ room ~ '_smooth_transition_duration') | float(0)) * 60 | int if is_state('input_boolean.sl_' ~ room ~ '_smooth_transition', 'on') else 0 }}"
    - choose:
        - conditions:
            - condition: template
              value_template: "{{ has_ct }}"
          sequence:
            - service: light.turn_on
              target:
                entity_id: "light.{{ room }}"
              data:
                brightness: "{{ brightness }}"
                color_temp_kelvin: "{{ ct_kelvin }}"
                transition: "{{ transition_secs }}"
      default:
        - service: light.turn_on
          target:
            entity_id: "light.{{ room }}"
          data:
            brightness: "{{ brightness }}"
            transition: "{{ transition_secs }}"
    - service: input_text.set_value
      target:
        entity_id: "input_text.sl_{{ room }}_last_scene_window"
      data:
        value: "{{ target_window }}"
