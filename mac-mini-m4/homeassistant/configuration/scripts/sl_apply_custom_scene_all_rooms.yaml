sl_apply_custom_scene_all_rooms:
  alias: "SL: Apply custom scene (all rooms)"
  description: >
    Restores lights from the pack saved in /config/sl_custom_scenes.json for this slug
    (Save with All Rooms + same custom name). Survives Home Assistant restarts.
  mode: single
  fields:
    window:
      description: "Same slug used when saving (custom scene name, lower + underscores)"
      required: true
      selector:
        text:
  sequence:
    - variables:
        window_in: "{{ window | default('', true) }}"
        sl_window: >-
          {% set w = window_in | string | trim %}
          {% if '{{' in w or w == '' or w in ['unknown', 'unavailable', 'none'] %}
            {{ states('input_text.sl_custom_scene_name') | lower | replace(' ', '_') }}
          {% else %}
            {{ w | lower | replace(' ', '_') }}
          {% endif %}
    - service: python_script.sl_custom_scenes_persist
      data:
        action: apply_all_rooms_pack
        slug: "{{ sl_window }}"
