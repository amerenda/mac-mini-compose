camera_privacy_on:
  alias: "Security: Cameras Off (Privacy On)"
  description: "Turn off LEDs (verified), then enable privacy mode (verified)"
  mode: single
  sequence:
    # ── Bedroom Camera ──
    - service: light.turn_off
      target:
        entity_id: light.bedroom_status_led
    - repeat:
        while:
          - condition: state
            entity_id: light.bedroom_status_led
            state: "on"
          - condition: template
            value_template: "{{ repeat.index <= 5 }}"
        sequence:
          - delay: { seconds: 2 }
          - service: light.turn_off
            target:
              entity_id: light.bedroom_status_led
    - service: switch.turn_on
      target:
        entity_id: switch.bedroom_privacy_mode
    - repeat:
        while:
          - condition: state
            entity_id: switch.bedroom_privacy_mode
            state: "off"
          - condition: template
            value_template: "{{ repeat.index <= 5 }}"
        sequence:
          - delay: { seconds: 2 }
          - service: switch.turn_on
            target:
              entity_id: switch.bedroom_privacy_mode

    # ── Living Room Camera ──
    - service: light.turn_off
      target:
        entity_id: light.living_room_status_led
    - repeat:
        while:
          - condition: state
            entity_id: light.living_room_status_led
            state: "on"
          - condition: template
            value_template: "{{ repeat.index <= 5 }}"
        sequence:
          - delay: { seconds: 2 }
          - service: light.turn_off
            target:
              entity_id: light.living_room_status_led
    - service: switch.turn_on
      target:
        entity_id: switch.living_room_privacy_mode
    - repeat:
        while:
          - condition: state
            entity_id: switch.living_room_privacy_mode
            state: "off"
          - condition: template
            value_template: "{{ repeat.index <= 5 }}"
        sequence:
          - delay: { seconds: 2 }
          - service: switch.turn_on
            target:
              entity_id: switch.living_room_privacy_mode

camera_privacy_off:
  alias: "Security: Cameras On (Privacy Off)"
  description: "Disable privacy mode (verified), then turn on LEDs (verified)"
  mode: single
  sequence:
    # ── Bedroom Camera ──
    - service: switch.turn_off
      target:
        entity_id: switch.bedroom_privacy_mode
    - repeat:
        while:
          - condition: state
            entity_id: switch.bedroom_privacy_mode
            state: "on"
          - condition: template
            value_template: "{{ repeat.index <= 5 }}"
        sequence:
          - delay: { seconds: 2 }
          - service: switch.turn_off
            target:
              entity_id: switch.bedroom_privacy_mode
    - service: light.turn_on
      target:
        entity_id: light.bedroom_status_led
    - repeat:
        while:
          - condition: state
            entity_id: light.bedroom_status_led
            state: "off"
          - condition: template
            value_template: "{{ repeat.index <= 5 }}"
        sequence:
          - delay: { seconds: 2 }
          - service: light.turn_on
            target:
              entity_id: light.bedroom_status_led

    # ── Living Room Camera ──
    - service: switch.turn_off
      target:
        entity_id: switch.living_room_privacy_mode
    - repeat:
        while:
          - condition: state
            entity_id: switch.living_room_privacy_mode
            state: "on"
          - condition: template
            value_template: "{{ repeat.index <= 5 }}"
        sequence:
          - delay: { seconds: 2 }
          - service: switch.turn_off
            target:
              entity_id: switch.living_room_privacy_mode
    - service: light.turn_on
      target:
        entity_id: light.living_room_status_led
    - repeat:
        while:
          - condition: state
            entity_id: light.living_room_status_led
            state: "off"
          - condition: template
            value_template: "{{ repeat.index <= 5 }}"
        sequence:
          - delay: { seconds: 2 }
          - service: light.turn_on
            target:
              entity_id: light.living_room_status_led
