# Smart Lighting v2 — Schedule profiles
# Each profile defines 4 time window boundaries

# Weekday profile (default: Mon-Thu)
sl_morning_start_weekday:
  name: "SL: Morning (Weekday)"
  has_date: false
  has_time: true
  initial: "06:00:00"
  icon: mdi:weather-sunset-up
sl_day_start_weekday:
  name: "SL: Day (Weekday)"
  has_date: false
  has_time: true
  initial: "09:00:00"
  icon: mdi:weather-sunny
sl_evening_start_weekday:
  name: "SL: Evening (Weekday)"
  has_date: false
  has_time: true
  initial: "17:00:00"
  icon: mdi:weather-sunset-down
sl_night_start_weekday:
  name: "SL: Night (Weekday)"
  has_date: false
  has_time: true
  initial: "22:00:00"
  icon: mdi:weather-night

