# Smart Lighting v2 — Kitchen scene overrides
# Options are populated dynamically by the sl_sync_scenes automation

sl_kitchen_morning_scene:
  name: "SL: Kitchen — Morning Scene"
  options:
    - scene.kitchen_morning
  initial: scene.kitchen_morning
  icon: mdi:palette

sl_kitchen_day_scene:
  name: "SL: Kitchen — Day Scene"
  options:
    - scene.kitchen_day
  initial: scene.kitchen_day
  icon: mdi:palette

sl_kitchen_evening_scene:
  name: "SL: Kitchen — Evening Scene"
  options:
    - scene.kitchen_evening
  initial: scene.kitchen_evening
  icon: mdi:palette

sl_kitchen_night_scene:
  name: "SL: Kitchen — Night Scene"
  options:
    - scene.kitchen_night
  initial: scene.kitchen_night
  icon: mdi:palette

