blueprint:
  name: "Room - Switch Control (Hue Dimmer)"
  description: >
    Map Hue 4-button dimmer actions to room lighting via SL v2 scripts.
    Button 1: toggle (scene on / off). Button 2: brightness up/max.
    Button 3: brightness down/min. Button 4: cycle scenes / all off.
  domain: "automation"

  input:
    room_key:
      name: "Room Key"
      description: "Room identifier matching SL convention (e.g., living_room)"
      selector:
        text: {}

    target_lights:
      name: "Target lights (group or list)"
      selector:
        target:
          entity:
            domain: "light"

    hue_event_id:
      name: "Hue event ID"
      description: "Example: living_room_switch_button"
      selector:
        text: {}

    dimmer:
      name: "Dimmer device ID"
      description: "Hue dimmer device ID (for identification only)"
      default: ""
      selector:
        text: {}

    brightness_step_pct:
      name: "Brightness step (%)"
      default: 20
      selector:
        number:
          min: 5
          max: 50
          unit_of_measurement: "%"

    min_brightness_pct:
      name: "Minimum brightness (%)"
      default: 5
      selector:
        number:
          min: 1
          max: 100
          unit_of_measurement: "%"

mode: "restart"
max_exceeded: "silent"

variables:
  room: !input room_key
  light_entity: !input target_lights
  brightness_step: !input brightness_step_pct
  min_bright: !input min_brightness_pct
  _light_id: >-
    {% if light_entity is mapping and 'entity_id' in light_entity %}
      {{ light_entity.entity_id }}
    {% else %}
      {{ light_entity }}
    {% endif %}

trigger:
  - platform: "event"
    event_type: "hue_event"
    event_data:
      id: !input hue_event_id
      type: "initial_press"
      subtype: 1
    id: btn1_short
  - platform: "event"
    event_type: "hue_event"
    event_data:
      id: !input hue_event_id
      type: "long_press"
      subtype: 1
    id: btn1_long
  - platform: "event"
    event_type: "hue_event"
    event_data:
      id: !input hue_event_id
      type: "initial_press"
      subtype: 2
    id: btn2_short
  - platform: "event"
    event_type: "hue_event"
    event_data:
      id: !input hue_event_id
      type: "long_press"
      subtype: 2
    id: btn2_long
  - platform: "event"
    event_type: "hue_event"
    event_data:
      id: !input hue_event_id
      type: "initial_press"
      subtype: 3
    id: btn3_short
  - platform: "event"
    event_type: "hue_event"
    event_data:
      id: !input hue_event_id
      type: "long_press"
      subtype: 3
    id: btn3_long
  - platform: "event"
    event_type: "hue_event"
    event_data:
      id: !input hue_event_id
      type: "short_release"
      subtype: 4
    id: btn4_short
  - platform: "event"
    event_type: "hue_event"
    event_data:
      id: !input hue_event_id
      type: "long_press"
      subtype: 4
    id: btn4_long

action:
  - choose:
      # Button 1 Short: Toggle (scene on / off)
      - conditions: "{{ trigger.id == 'btn1_short' }}"
        sequence:
          - if:
              - condition: template
                value_template: "{{ is_state(_light_id, 'on') }}"
            then:
              - service: script.sl_room_off
                data:
                  room: "{{ room }}"
            else:
              - service: script.sl_room_on
                data:
                  room: "{{ room }}"

      # Button 1 Long: Power off room
      - conditions: "{{ trigger.id == 'btn1_long' }}"
        sequence:
          - service: script.sl_room_off
            data:
              room: "{{ room }}"

      # Button 2 Short: Brightness up
      - conditions: "{{ trigger.id == 'btn2_short' }}"
        sequence:
          - service: light.turn_on
            target: !input target_lights
            data:
              brightness_step_pct: "{{ brightness_step | int }}"

      # Button 2 Long: Brightness max
      - conditions: "{{ trigger.id == 'btn2_long' }}"
        sequence:
          - service: light.turn_on
            target: !input target_lights
            data:
              brightness_pct: 100

      # Button 3 Short: Brightness down
      - conditions: "{{ trigger.id == 'btn3_short' }}"
        sequence:
          - service: light.turn_on
            target: !input target_lights
            data:
              brightness_step_pct: "{{ 0 - (brightness_step | int) }}"

      # Button 3 Long: Brightness min
      - conditions: "{{ trigger.id == 'btn3_long' }}"
        sequence:
          - service: light.turn_on
            target: !input target_lights
            data:
              brightness_pct: "{{ min_bright | int }}"

      # Button 4 Short: Cycle scenes
      - conditions: "{{ trigger.id == 'btn4_short' }}"
        sequence:
          - service: script.sl_cycle_scene
            data:
              room: "{{ room }}"

      # Button 4 Long: All lights off
      - conditions: "{{ trigger.id == 'btn4_long' }}"
        sequence:
          - service: script.sl_toggle_all
