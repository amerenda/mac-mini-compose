alias: "SL: Push Z2M config when Smart Lighting master toggles"
id: sl_push_config_on_sl_enabled
description: >
  smart-lighting.js reads sl_enabled only from retained zigbee2mqtt/sl/config.
  Toggling input_boolean.sl_enabled in HA does not update MQTT until sl_push_config runs.
mode: single
trigger:
  - platform: state
    entity_id: input_boolean.sl_enabled
action:
  - service: script.sl_push_config
