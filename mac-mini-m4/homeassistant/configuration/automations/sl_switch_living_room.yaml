alias: "SL: Living Room Switch"
description: "Hue Dimmer living_room_s_1 → SL scripts (MQTT trigger, Z2M-paired)"
mode: restart
max_exceeded: silent

trigger:
  - platform: mqtt
    topic: zigbee2mqtt/living_room_s_1
    value_template: "{{ value_json.action }}"
    payload: "on_press_release"
    id: btn1_short
  - platform: mqtt
    topic: zigbee2mqtt/living_room_s_1
    value_template: "{{ value_json.action }}"
    payload: "on_hold"
    id: btn1_long
  - platform: mqtt
    topic: zigbee2mqtt/living_room_s_1
    value_template: "{{ value_json.action }}"
    payload: "up_press_release"
    id: btn2_short
  - platform: mqtt
    topic: zigbee2mqtt/living_room_s_1
    value_template: "{{ value_json.action }}"
    payload: "up_hold"
    id: btn2_long
  - platform: mqtt
    topic: zigbee2mqtt/living_room_s_1
    value_template: "{{ value_json.action }}"
    payload: "down_press_release"
    id: btn3_short
  - platform: mqtt
    topic: zigbee2mqtt/living_room_s_1
    value_template: "{{ value_json.action }}"
    payload: "down_hold"
    id: btn3_long
  - platform: mqtt
    topic: zigbee2mqtt/living_room_s_1
    value_template: "{{ value_json.action }}"
    payload: "off_press_release"
    id: btn4_short
  - platform: mqtt
    topic: zigbee2mqtt/living_room_s_1
    value_template: "{{ value_json.action }}"
    payload: "off_hold"
    id: btn4_long

action:
  - choose:
      - conditions: "{{ trigger.id == 'btn1_short' }}"
        sequence:
          - if:
              - condition: state
                entity_id: light.living_room
                state: "on"
            then:
              - service: script.sl_room_off
                data:
                  room: living_room
            else:
              - service: script.sl_room_on
                data:
                  room: living_room
      - conditions: "{{ trigger.id == 'btn1_long' }}"
        sequence:
          - service: script.sl_room_off
            data:
              room: living_room
      - conditions: "{{ trigger.id == 'btn2_short' }}"
        sequence:
          - service: light.turn_on
            target:
              entity_id: light.living_room
            data:
              brightness_step_pct: 20
      - conditions: "{{ trigger.id == 'btn2_long' }}"
        sequence:
          - service: light.turn_on
            target:
              entity_id: light.living_room
            data:
              brightness_pct: 100
      - conditions: "{{ trigger.id == 'btn3_short' }}"
        sequence:
          - service: light.turn_on
            target:
              entity_id: light.living_room
            data:
              brightness_step_pct: -20
      - conditions: "{{ trigger.id == 'btn3_long' }}"
        sequence:
          - service: light.turn_on
            target:
              entity_id: light.living_room
            data:
              brightness_pct: 5
      - conditions: "{{ trigger.id == 'btn4_short' }}"
        sequence:
          - service: script.sl_cycle_scene
            data:
              room: living_room
      - conditions: "{{ trigger.id == 'btn4_long' }}"
        sequence:
          - service: script.sl_toggle_all
