alias: "Security: Privacy Monitor (Drift Correction)"
id: security_privacy_monitor
mode: single
trigger:
  - platform: time_pattern
    minutes: "/1"
condition: []
action:
  # Skip if cameras are disabled/unavailable
  - if:
      - condition: template
        value_template: >
          {{ states('switch.bedroom_privacy_mode') in ['unavailable', 'unknown']
             and states('switch.living_room_privacy_mode') in ['unavailable', 'unknown'] }}
    then:
      - stop: "Cameras unavailable — skipping"
  - choose:
      # Someone home → privacy on, LEDs off
      - conditions:
          - condition: state
            entity_id: group.members
            state: "home"
        sequence:
          # Check if privacy is already correct
          - condition: template
            value_template: >
              {{ is_state('switch.bedroom_privacy_mode', 'off')
                 or is_state('switch.living_room_privacy_mode', 'off')
                 or is_state('light.bedroom_status_led', 'on')
                 or is_state('light.living_room_status_led', 'on') }}
          - service: script.camera_privacy_on

      # Nobody home → privacy off, LEDs on
      - conditions:
          - condition: state
            entity_id: group.members
            state: "not_home"
        sequence:
          # Check if privacy is already correct
          - condition: template
            value_template: >
              {{ is_state('switch.bedroom_privacy_mode', 'on')
                 or is_state('switch.living_room_privacy_mode', 'on')
                 or is_state('light.bedroom_status_led', 'off')
                 or is_state('light.living_room_status_led', 'off') }}
          - service: script.camera_privacy_off
