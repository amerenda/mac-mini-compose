# Backup services for Mac Mini M4 monitoring stack (Grafana, Prometheus).
# Add these to mac-mini-m4/monitoring/compose.yaml as additional services under `services:`.
#
# All backup scripts write locally only to a shared staging directory (/backups-local/).

services:
  # ============================================================
  # Grafana Dashboard Export — exports dashboards via REST API to JSON files
  # Runs daily at 04:00. Local retention: keeps latest 5 per dashboard.
  # Exports: all dashboards from /api/search → /api/dashboards/uid/{uid}
  #           datasources from /api/datasources
  # ============================================================
  grafana-backup:
    image: alpine:3
    container_name: grafana-backup
    restart: unless-stopped
    depends_on: [grafana]
    volumes:
      - backups-local:/backups-local            # shared staging directory (all backup containers write here)
      - ./backup-stack/backup-scripts/grafana-export.sh:/export.sh:ro
    environment:
      GRAFANA_URL: "http://grafana:3000"       # Docker service name (internal networking)
      GRAFANA_API_TOKEN: "${GRAFANA_API_TOKEN}"  # API token from .env
    command: >
      sh -c "
        apk add --no-cache curl jq &&
        while true; do
          /export.sh 2>&1 | tee -a /var/log/grafana-backup.log
          echo '[\$(date)] Sleeping until next backup (24 hours)...'
          sleep 86400
        done
      "

  # ============================================================
  # Prometheus Config Backup — exports scrape targets and global config only
  # Runs daily at 04:30. Local retention: keep last 7 backups.
  # NOTE: Time-series data NOT backed up here (ephemeral ~30-day retention).
  #       If full recovery needed, rely on remote_write targets or K3s Prometheus setup.
  # ============================================================
  prometheus-config-backup:
    image: alpine:3
    container_name: prometheus-config-backup
    restart: unless-stopped
    depends_on: [prometheus]
    volumes:
      - prometheus-data:/prometheus/data:ro     # read-only mount of Prometheus data volume
     - backups-local:/backups-local            # shared staging directory (all backup containers write here)
      - ./backup-stack/backup-scripts/prometheus-config.sh:/promconfig.sh:ro
    command: >
      sh -c "
        while true; do
          /promconfig.sh 2>&1 | tee -a /var/log/prometheus-config-backup.log
          echo '[\$(date)] Sleeping until next backup (24 hours)...'
          sleep 86400
        done
      "

volumes:
  backups-local:                                # Shared staging volume for all backup containers
