# llm-manager stack on Mac Mini — agent + compose-managed Ollama.
# Top-level name fixes the Docker Compose project name; matches Komodo stack id.
#
# Mount the full host Ollama data dir to /root/.ollama (not .../models → /root/.ollama).
# See archlinux/llm/compose.yaml for rationale.
name: llm-mac-mini-m4

services:
  ollama:
    image: ollama/ollama:${OLLAMA_IMAGE_TAG:-0.21.0}
    pull_policy: always
    container_name: ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    env_file:
      - ollama.env
      - ollama.ui.env
    environment:
      OLLAMA_HOST: 0.0.0.0:11434
    volumes:
      - ${OLLAMA_DATA_HOST_PATH:-/Users/alex/.ollama}:/root/.ollama
    # No `gpus` — Docker on macOS does not expose Metal to Linux containers.

  llm-agent:
    image: amerenda/llm-manager:agent-${AGENT_IMAGE_TAG:-latest}
    pull_policy: always
    container_name: llm-agent
    restart: unless-stopped
    ports:
      - "8090:8090"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    env_file:
      - .env
    environment:
      RUNNER_HOSTNAME: mac-mini-m4
      AGENT_UNIFIED_MEMORY_VRAM: "true"
      OLLAMA_URL: http://ollama:11434
      OLLAMA_CONTAINER: ollama
      AGENT_DISK_STAT_PATH: /host-ollama-data
      COMPOSE_PROFILE: ""
      COMPOSE_DIR: ${HOST_LLM_COMPOSE_DIR}
      COMPOSE_DIR_LOCAL: /host/llm-compose
      MODEL_STORAGE_PATH: /host-ollama-models
    depends_on:
      - ollama
    volumes:
      - llm-agent-tls:/data/tls
      - /var/run/docker.sock:/var/run/docker.sock
      # Agent disk stats use /hostfs + OLLAMA_*_HOST_PATH; bind mounts alone lie on OrbStack.
      - /:/hostfs:ro
      - ${OLLAMA_MODELS_HOST_PATH:-/Users/alex/.ollama/models}:/host-ollama-models:ro
      - ${OLLAMA_DATA_HOST_PATH:-/Users/alex/.ollama}:/host-ollama-data:ro
      - ${HOST_LLM_COMPOSE_DIR}:/host/llm-compose:rw

volumes:
  llm-agent-tls:
