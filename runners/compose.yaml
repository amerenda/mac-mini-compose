x-runner-common: &runner-common
  image: myoung34/github-runner:ubuntu-noble
  restart: unless-stopped
  env_file: ./compose.env
  entrypoint: ["/run/secrets/entrypoint-wrapper.sh"]
  command: ["./bin/Runner.Listener", "run", "--startuptype", "service"]
  volumes:
    - /var/run/docker.sock:/var/run/docker.sock
    - /etc/komodo/runner-secrets:/run/secrets:ro
  labels:
    komodo.skip:

services:
  runner-k3s-runners:
    <<: *runner-common
    container_name: runner-k3s-runners
    environment:
      REPO_URL: https://github.com/amerenda/k3s-runners
      RUNNER_NAME: mini-k3s-runners
      LABELS: self-hosted,linux,arm64,docker,mac-mini

  runner-ecdysis:
    <<: *runner-common
    container_name: runner-ecdysis
    environment:
      REPO_URL: https://github.com/amerenda/ecdysis
      RUNNER_NAME: mini-ecdysis
      LABELS: self-hosted,linux,arm64,docker,mac-mini

  runner-llm-manager:
    <<: *runner-common
    container_name: runner-llm-manager
    environment:
      REPO_URL: https://github.com/amerenda/llm-manager
      RUNNER_NAME: mini-llm-manager
      LABELS: self-hosted,linux,arm64,docker,mac-mini

  runner-llm-agents:
    <<: *runner-common
    container_name: runner-llm-agents
    environment:
      REPO_URL: https://github.com/amerenda/llm-agents
      RUNNER_NAME: mini-llm-agents
      LABELS: self-hosted,linux,arm64,docker,mac-mini

  runner-mycroft:
    <<: *runner-common
    container_name: runner-mycroft
    environment:
      REPO_URL: https://github.com/amerenda/mycroft
      RUNNER_NAME: mini-mycroft
      LABELS: self-hosted,linux,arm64,docker,mac-mini

  runner-wikimedia:
    <<: *runner-common
    container_name: runner-wikimedia
    environment:
      REPO_URL: https://github.com/amerenda/wikimedia
      RUNNER_NAME: mini-wikimedia
      LABELS: self-hosted,linux,arm64,docker,mac-mini

  runner-photos:
    <<: *runner-common
    container_name: runner-photos
    environment:
      REPO_URL: https://github.com/amerenda/photos
      RUNNER_NAME: mini-photos
      LABELS: self-hosted,linux,arm64,docker,mac-mini
