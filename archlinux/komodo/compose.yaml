# Komodo Periphery for the archlinux host.
# Self-managed (komodo.skip): deployed by Ansible
# (playbooks/infrastructure/setup-archlinux-komodo.yml in ansible-playbooks),
# never re-deployed by Komodo itself.
#
# Komodo Core (on mac-mini-m4) connects out to https://<this-host>:8120 using
# PERIPHERY_PASSKEYS (shared secret from Bitwarden Secrets Manager).

services:
  periphery:
    build:
      context: .
      dockerfile: Dockerfile.periphery
    container_name: komodo-periphery
    labels:
      komodo.skip:
    restart: unless-stopped
    ports:
      - "8120:8120"
    env_file: ./compose.env
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /proc:/proc
      - /etc/komodo:/etc/komodo
      # BWS access token (mode 0600 on host) — read by pre_deploy via /run/secrets/.
      - /etc/komodo/.bws-secret:/run/secrets/bws-access-token:ro
      # Media-server bind-mount roots so Periphery can pre-create stack folders.
      - /mnt/storage/media/config:/mnt/storage/media/config
      - /mnt/storage:/mnt/storage
