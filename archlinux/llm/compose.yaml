# llm-manager stack on archlinux — agent + compose-managed Ollama.
#
# Ollama expects the *entire* data dir at /root/.ollama (models live in
# /root/.ollama/models/...). Mounting only the host's models folder to
# /root/.ollama breaks that layout and the daemon won't see pulls.
# pre-deploy sets OLLAMA_DATA_HOST_PATH (default ~/.ollama) and
# OLLAMA_MODELS_HOST_PATH=$OLLAMA_DATA_HOST_PATH/models for the agent RO mount.
name: llm-archlinux

services:
  ollama:
    image: ollama/ollama:${OLLAMA_IMAGE_TAG:-0.21.0}
    pull_policy: always
    container_name: ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    env_file:
      - ollama.env
    environment:
      OLLAMA_HOST: 0.0.0.0:11434
    volumes:
      - ${OLLAMA_DATA_HOST_PATH:-/home/alex/.ollama}:/root/.ollama
    # NVIDIA path for archlinux host; switch to ollama/ollama:*-rocm if needed.
    gpus: all

  llm-agent:
    image: amerenda/llm-manager:agent-${AGENT_IMAGE_TAG:-latest}
    pull_policy: always
    container_name: llm-agent
    restart: unless-stopped
    ports:
      - "8090:8090"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    env_file:
      - .env
    environment:
      RUNNER_HOSTNAME: archlinux
      OLLAMA_URL: http://ollama:11434
      OLLAMA_CONTAINER: ollama
      COMPOSE_PROFILE: ""
      COMPOSE_DIR: ${HOST_LLM_COMPOSE_DIR}
      COMPOSE_DIR_LOCAL: /host/llm-compose
      MODEL_STORAGE_PATH: /host-ollama-models
    depends_on:
      - ollama
    volumes:
      - llm-agent-tls:/data/tls
      - /var/run/docker.sock:/var/run/docker.sock
      - ${OLLAMA_MODELS_HOST_PATH:-/home/alex/.ollama/models}:/host-ollama-models:ro
      - ${HOST_LLM_COMPOSE_DIR}:/host/llm-compose:rw
    # pynvml in the agent; requires nvidia-container-toolkit (AMD: agent-amd + dri/kfd).
    gpus: all

volumes:
  llm-agent-tls:
