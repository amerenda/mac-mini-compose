# llm-manager stack on archlinux — agent + compose-managed Ollama.
#
# Ollama expects the *entire* data dir at /root/.ollama (models live in
# /root/.ollama/models/...). Mounting only the host's models folder to
# /root/.ollama breaks that layout and the daemon won't see pulls.
# pre-deploy sets OLLAMA_DATA_HOST_PATH (default ~/.ollama) and
# OLLAMA_MODELS_HOST_PATH (default /mnt/storage/models) for models + agent RO mount.
name: llm-archlinux

services:
  ollama:
    image: ollama/ollama:${OLLAMA_AMD_IMAGE_TAG:-0.21.0-rocm}
    pull_policy: always
    container_name: ollama
    restart: unless-stopped
    # Docker sometimes creates 127.0.0.11 with no upstream forwarders (especially
    # right after boot) — agent/Ollama then cannot resolve BACKEND_URL / pulls.
    dns:
      - ${DOCKER_DNS_1:-1.1.1.1}
      - ${DOCKER_DNS_2:-8.8.8.8}
    ports:
      - "11434:11434"
    env_file:
      - ollama.env
      - ollama.ui.env
    environment:
      OLLAMA_HOST: 0.0.0.0:11434
      OLLAMA_MODELS: /mnt/models
      HSA_OVERRIDE_GFX_VERSION: ${HSA_OVERRIDE_GFX_VERSION:-}
    volumes:
      - ${OLLAMA_DATA_HOST_PATH:-/home/alex/.ollama}:/root/.ollama
      - ${OLLAMA_MODELS_HOST_PATH:-/mnt/storage/models}:/mnt/models
    devices:
      - /dev/kfd:/dev/kfd
      - /dev/dri:/dev/dri
    group_add:
      - "${VIDEO_GID:-985}"
      - "${RENDER_GID:-989}"

  llm-agent:
    image: amerenda/llm-manager:agent-amd-${AGENT_IMAGE_TAG:-latest}
    pull_policy: always
    container_name: llm-agent
    restart: unless-stopped
    dns:
      - ${DOCKER_DNS_1:-1.1.1.1}
      - ${DOCKER_DNS_2:-8.8.8.8}
    ports:
      - "8090:8090"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    env_file:
      - .env
    environment:
      RUNNER_HOSTNAME: archlinux
      OLLAMA_URL: http://ollama:11434
      OLLAMA_CONTAINER: ollama
      HSA_OVERRIDE_GFX_VERSION: ${HSA_OVERRIDE_GFX_VERSION:-}
      COMPOSE_PROFILE: ""
      COMPOSE_DIR: ${HOST_LLM_COMPOSE_DIR}
      COMPOSE_DIR_LOCAL: /host/llm-compose
      MODEL_STORAGE_PATH: /host-ollama-models
    depends_on:
      - ollama
    volumes:
      - llm-agent-tls:/data/tls
      - /var/run/docker.sock:/var/run/docker.sock
      - /:/hostfs:ro
      - ${OLLAMA_MODELS_HOST_PATH:-/mnt/storage/models}:/host-ollama-models:ro
      - /sys/module/amdgpu:/sys/module/amdgpu:ro
      - ${HOST_LLM_COMPOSE_DIR}:/host/llm-compose:rw
    devices:
      - /dev/kfd:/dev/kfd
      - /dev/dri:/dev/dri
    group_add:
      - "${VIDEO_GID:-985}"
      - "${RENDER_GID:-989}"

volumes:
  llm-agent-tls:
