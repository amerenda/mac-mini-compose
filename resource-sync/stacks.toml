# Komodo Resource Sync — Stack definitions
# These are synced automatically by Komodo when changes are pushed to main.
# Secrets use [[VARIABLE]] interpolation — define secrets in Komodo UI (Settings → Variables).

[[stack]]
name = "services"
description = "Core services: Home Assistant, Pi-hole, BIND9, exporters"
tags = ["mac-mini"]
deploy = true
[stack.config]
server = "mac-mini-m4"
repo = "amerenda/mac-mini-compose"
branch = "main"
file_paths = ["docker-compose.yaml"]
git_account = "amerenda"
environment = """
PIHOLE_WEBPASSWORD = [[PIHOLE_WEBPASSWORD]]
"""

[[stack]]
name = "runners"
description = "GitHub Actions runners (k3s-runners, ecdysis, llm-manager, llm-agents)"
tags = ["mac-mini"]
deploy = true
[stack.config]
server = "mac-mini-m4"
repo = "amerenda/mac-mini-compose"
branch = "main"
file_paths = ["runners/compose.yaml"]
git_account = "amerenda"
environment = """
DOCKERHUB_USERNAME = amerenda
RUNNER_SCOPE = repo
RUNNER_WORKDIR = /_work
RANDOM_RUNNER_SUFFIX = false
"""
