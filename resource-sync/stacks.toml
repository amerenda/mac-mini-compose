# ── Monitoring: Prometheus, Node Exporter, DB Exporters ────────────────────

[[stack]]
name = "monitoring"
description = "Prometheus, Grafana, node-exporter, postgres/mongo/technitium exporters"
tags = ["mac-mini"]
deploy = true
[stack.config]
server = "mac-mini-m4"
repo = "amerenda/komodo-dean-gitops"
branch = "main"
file_paths = ["mac-mini-m4/monitoring/compose.yaml"]
git_account = "amerenda"
[stack.config.pre_deploy]
command = """
export BWS_ACCESS_TOKEN=$(cat /run/secrets/bws-access-token)
printf 'MINI_POSTGRES_PASSWORD=%s\n' "$(bws secret get a280e465-8813-4b48-9972-b4210149cb60 --access-token "$BWS_ACCESS_TOKEN" | jq -r .value)" > mac-mini-m4/monitoring/.env
printf 'MONGO_PASSWORD=%s\n' "$(bws secret get d0213758-1881-4d35-8fd2-b39d015cb7b9 --access-token "$BWS_ACCESS_TOKEN" | jq -r .value)" >> mac-mini-m4/monitoring/.env
printf 'TECHNITIUM_API_TOKEN=%s\n' "$(bws secret get 4645ac46-3955-4e6e-8558-b434015613a7 --access-token "$BWS_ACCESS_TOKEN" | jq -r .value)" >> mac-mini-m4/monitoring/.env
printf 'GRAFANA_ADMIN_USER=admin\n' >> mac-mini-m4/monitoring/.env
printf 'GRAFANA_ADMIN_PASSWORD=%s\n' "$(bws secret get 9a2f2c00-0cc9-4aac-91da-b43d00f980d1 --access-token "$BWS_ACCESS_TOKEN" | jq -r .value)" >> mac-mini-m4/monitoring/.env
test -f mac-mini-m4/monitoring/compose.yaml && test -d mac-mini-m4/monitoring/grafana/dashboards || exit 1
printf 'MONITORING_DIR=%s/mac-mini-m4/monitoring\n' "$(pwd)" >> mac-mini-m4/monitoring/.env
bws secret get c7ccdb87-b04e-428e-bbcf-b4340156edf6 --access-token "$BWS_ACCESS_TOKEN" | jq -r .value > mac-mini-m4/monitoring/ha-token
"""

# ── Runners: GitHub Actions self-hosted runners ───────────────────────────

[[stack]]
name = "runners"
description = "GitHub Actions runners (k3s-runners, ecdysis, llm-manager, llm-agents)"
tags = ["mac-mini"]
deploy = true
[stack.config]
server = "mac-mini-m4"
repo = "amerenda/komodo-dean-gitops"
branch = "main"
file_paths = ["mac-mini-m4/runners/compose.yaml"]
git_account = "amerenda"
[stack.config.pre_deploy]
command = """
export BWS_ACCESS_TOKEN=$(cat /run/secrets/bws-access-token)
printf 'DOCKERHUB_USERNAME=amerenda\nRUNNER_SCOPE=repo\nRUNNER_WORKDIR=/_work\nRANDOM_RUNNER_SUFFIX=false\n' > mac-mini-m4/runners/compose.env
mkdir -p /etc/komodo/runner-secrets
bws secret get 2c57558f-d185-4410-ad9d-b385015c9302 --access-token "$BWS_ACCESS_TOKEN" | jq -r .value > /etc/komodo/runner-secrets/github-app-arc-id
bws secret get 0015f9ab-dd5e-4649-a262-b385015ceac1 --access-token "$BWS_ACCESS_TOKEN" | jq -r .value > /etc/komodo/runner-secrets/github-app-arc-private-key
bws secret get c5ad7fae-2f58-4a8b-9651-b413001cad7f --access-token "$BWS_ACCESS_TOKEN" | jq -r .value > /etc/komodo/runner-secrets/docker-hub-k3s-runner-api-key
bws secret get 42ea6b6b-3b1e-43d9-8743-b41301665cc9 --access-token "$BWS_ACCESS_TOKEN" | jq -r .value > /etc/komodo/runner-secrets/github-pat-k3s-dean-gitops
cp mac-mini-m4/runners/entrypoint-wrapper.sh /etc/komodo/runner-secrets/entrypoint-wrapper.sh
chmod +x /etc/komodo/runner-secrets/entrypoint-wrapper.sh
"""

