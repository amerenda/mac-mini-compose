# Komodo Resource Sync — Stack definitions
# Synced automatically when changes are pushed to main.
# Secrets are fetched from Bitwarden Secrets Manager at deploy time via pre_deploy.
#
# Secrets remain in the existing k3s BWS project. A mac-mini machine account
# has read access to that project. Secrets are fetched by UUID.
#
# NOTE: Komodo joins multi-line pre_deploy commands with ' && ' so bash
# function definitions and if/then/else blocks cannot be used directly.
# Use simple sequential commands or call an external script instead.

# ── Core: DNS, Postgres, MongoDB, Backups ──────────────────────────────────

[[stack]]
name = "core"
description = "Technitium DNS, PostgreSQL, MongoDB, database backups"
tags = ["mac-mini"]
deploy = true
[stack.config]
server = "mac-mini-m4"
repo = "amerenda/mac-mini-compose"
branch = "main"
file_paths = ["core/compose.yaml"]
git_account = "amerenda"
[stack.config.pre_deploy]
command = """
export BWS_ACCESS_TOKEN=$(cat /run/secrets/bws-access-token)
printf 'TECHNITIUM_ADMIN_PASSWORD=%s\n' "$(bws secret get ae363b89-3fd6-43e3-9a83-b42100e7aed3 --access-token "$BWS_ACCESS_TOKEN" | jq -r .value)" > core/.env
printf 'MINI_POSTGRES_PASSWORD=%s\n' "$(bws secret get a280e465-8813-4b48-9972-b4210149cb60 --access-token "$BWS_ACCESS_TOKEN" | jq -r .value)" >> core/.env
printf 'MINI_POSTGRES_TODO_PASSWORD=%s\n' "$(bws secret get 081051dc-3adb-4499-ad0f-b421014a114f --access-token "$BWS_ACCESS_TOKEN" | jq -r .value)" >> core/.env
printf 'AGENT_KB_PASSWORD=%s\n' "$(bws secret get 549c2404-4417-48bd-9fa1-b41c00e6365c --access-token "$BWS_ACCESS_TOKEN" | jq -r .value)" >> core/.env
printf 'MONGO_PASSWORD=%s\n' "$(bws secret get d0213758-1881-4d35-8fd2-b39d015cb7b9 --access-token "$BWS_ACCESS_TOKEN" | jq -r .value)" >> core/.env
printf 'BACKUP_ACCESS_KEY=%s\n' "$(bws secret get af4a292f-1f9f-45b1-9c56-b37300df69dc --access-token "$BWS_ACCESS_TOKEN" | jq -r .value)" >> core/.env
printf 'BACKUP_SECRET_KEY=%s\n' "$(bws secret get d2d87681-b2e3-4a3e-b821-b37300df7ce5 --access-token "$BWS_ACCESS_TOKEN" | jq -r .value)" >> core/.env
printf 'BACKUP_ENDPOINT=%s\n' "$(bws secret get 2c95ebd0-9330-455b-abbd-b37300e580b0 --access-token "$BWS_ACCESS_TOKEN" | jq -r .value)" >> core/.env
mkdir -p bind9/keys
printf 'key "externaldns-key." { algorithm hmac-sha256; secret "%s"; };\n' "$(bws secret get 9904dc3d-6dd4-4727-907e-b3700178ea19 --access-token "$BWS_ACCESS_TOKEN" | jq -r .value)" > bind9/keys/key.conf
"""

# ── Automation: Home Assistant, Voice Pipeline, Zigbee, MQTT ───────────────

[[stack]]
name = "automation"
description = "Home Assistant, Whisper, Piper, OpenWakeWord, Mosquitto, Zigbee2MQTT"
tags = ["mac-mini"]
