# Komodo Resource Sync — Stack definitions
# Synced automatically when changes are pushed to main.
# Secrets are fetched from Bitwarden Secrets Manager at deploy time via pre_deploy.

[[stack]]
name = "services"
description = "Core services: Home Assistant, Pi-hole, BIND9, exporters"
tags = ["mac-mini"]
deploy = true
[stack.config]
server = "mac-mini-m4"
repo = "amerenda/mac-mini-compose"
branch = "main"
file_paths = ["docker-compose.yaml"]
git_account = "amerenda"
ignore_services = ["hacs-init"]
[stack.config.pre_deploy]
command = """
export BWS_ACCESS_TOKEN=$(cat /run/secrets/bws-access-token)
fetch_secret() {
  local id=$1
  local val
  val=$(bws secret get "$id" --access-token "$BWS_ACCESS_TOKEN" | jq -r .value)
  if [ -n "$val" ] && [ "$val" != "null" ]; then
    printf '%s' "$val"
  else
    echo "WARN: failed to fetch secret $id" >&2
    return 1
  fi
}
PIHOLE_PW=$(fetch_secret c8157be0-0195-41f3-b3c6-b37100d27645) && echo "PIHOLE_WEBPASSWORD=$PIHOLE_PW" > .env
mkdir -p bind9/keys
BIND_KEY=$(fetch_secret 9904dc3d-6dd4-4727-907e-b3700178ea19) && echo "key \"externaldns-key.\" { algorithm hmac-sha256; secret \"${BIND_KEY}\"; };" > bind9/keys/key.conf
"""

[[stack]]
name = "runners"
description = "GitHub Actions runners (k3s-runners, ecdysis, llm-manager, llm-agents)"
tags = ["mac-mini"]
deploy = true
[stack.config]
server = "mac-mini-m4"
repo = "amerenda/mac-mini-compose"
branch = "main"
file_paths = ["runners/compose.yaml"]
git_account = "amerenda"
[stack.config.pre_deploy]
command = """
export BWS_ACCESS_TOKEN=$(cat /run/secrets/bws-access-token)
printf 'DOCKERHUB_USERNAME=amerenda\nRUNNER_SCOPE=repo\nRUNNER_WORKDIR=/_work\nRANDOM_RUNNER_SUFFIX=false\n' > runners/compose.env
mkdir -p /etc/komodo/runner-secrets
fetch_secret() {
  local id=$1 dest=$2
  local val
  val=$(bws secret get "$id" --access-token "$BWS_ACCESS_TOKEN" | jq -r .value)
  if [ -n "$val" ] && [ "$val" != "null" ]; then
    printf '%s' "$val" > "$dest"
  else
    echo "WARN: failed to fetch secret for $dest, keeping existing file" >&2
  fi
}
fetch_secret 2c57558f-d185-4410-ad9d-b385015c9302 /etc/komodo/runner-secrets/github-app-arc-id
fetch_secret 0015f9ab-dd5e-4649-a262-b385015ceac1 /etc/komodo/runner-secrets/github-app-arc-private-key
fetch_secret c5ad7fae-2f58-4a8b-9651-b413001cad7f /etc/komodo/runner-secrets/docker-hub-k3s-runner-api-key
fetch_secret 42ea6b6b-3b1e-43d9-8743-b41301665cc9 /etc/komodo/runner-secrets/github-pat-k3s-dean-gitops
cp runners/entrypoint-wrapper.sh /etc/komodo/runner-secrets/entrypoint-wrapper.sh
chmod +x /etc/komodo/runner-secrets/entrypoint-wrapper.sh
"""
