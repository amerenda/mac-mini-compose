# ── archlinux Periphery server ─────────────────────────────────────────────
# Periphery is bootstrapped on the host by Ansible
# (playbooks/infrastructure/setup-archlinux-komodo.yml in ansible-playbooks).
# This [[server]] block is what makes Komodo Core dial out to it.

[[server]]
name = "archlinux"
description = "Arch Linux home server (10.100.20.25) — media-server stack"
tags = ["archlinux"]
[server.config]
address = "https://10.100.20.25:8120"
enabled = true
# Intentionally empty: Core uses its global passkey (KOMODO_PASSKEY_FILE →
# komodo-dean-passkey on the Mac Mini), which must match PERIPHERY_PASSKEYS on
# Arch. Do NOT use [[KOMODO_PERIPHERY_PASSKEY]] here — Core can persist the
# placeholder literally and you get "Invalid passkey" even when the Variable is correct.
passkey = ""

# ── Media server: Jellyfin + servarr + nginx/certbot + DO dyndns ──────────

[[stack]]
name = "media-server"
description = "Jellyfin, radarr/sonarr/bazarr/prowlarr/profilarr, sabnzbd, nginx/certbot, DO dyndns"
tags = ["archlinux", "media"]
deploy = true
[stack.config]
server = "archlinux"
repo = "amerenda/komodo-dean-gitops"
branch = "main"
file_paths = ["archlinux/media-server/compose.yaml"]
git_account = "amerenda"
[stack.config.pre_deploy]
command = """
export BWS_ACCESS_TOKEN=$(cat /run/secrets/bws-access-token)
bash archlinux/media-server/pre-deploy.sh
"""
