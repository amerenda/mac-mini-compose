# Komodo Resource Sync — Stack definitions
# Synced automatically when changes are pushed to main.
# Secrets are fetched from Bitwarden Secrets Manager at deploy time via pre_deploy.
#
# Each stack has a dedicated BWS project. Secrets are named as their env var
# names, so `bws secret list --project-id <id>` dumps a ready-to-use .env.
#
# NOTE: Komodo joins multi-line pre_deploy commands with ' && ' so bash
# function definitions and if/then/else blocks cannot be used directly.
# Use simple sequential commands or call an external script instead.

# ── Core: DNS, Postgres, MongoDB, Backups ──────────────────────────────────

[[stack]]
name = "core"
description = "Technitium DNS, PostgreSQL, MongoDB, database backups"
tags = ["mac-mini"]
deploy = true
[stack.config]
server = "mac-mini-m4"
repo = "amerenda/mac-mini-compose"
branch = "main"
file_paths = ["core/compose.yaml"]
git_account = "amerenda"
[stack.config.pre_deploy]
command = """
export BWS_ACCESS_TOKEN=$(cat /run/secrets/bws-access-token)
bws secret list --project-id PLACEHOLDER_CORE_PROJECT_ID --access-token "$BWS_ACCESS_TOKEN" | jq -r '.[] | "\(.key)=\(.value)"' > core/.env
mkdir -p bind9/keys
BIND_KEY=$(bws secret get 9904dc3d-6dd4-4727-907e-b3700178ea19 --access-token "$BWS_ACCESS_TOKEN" | jq -r .value)
printf 'key "externaldns-key." { algorithm hmac-sha256; secret "%s"; };\n' "$BIND_KEY" > bind9/keys/key.conf
"""

# ── Automation: Home Assistant, Voice Pipeline, Zigbee, MQTT ───────────────

[[stack]]
name = "automation"
description = "Home Assistant, Whisper, Piper, OpenWakeWord, Mosquitto, Zigbee2MQTT"
tags = ["mac-mini"]
deploy = true
[stack.config]
server = "mac-mini-m4"
repo = "amerenda/mac-mini-compose"
branch = "main"
file_paths = ["automation/compose.yaml"]
git_account = "amerenda"
ignore_services = ["hacs-init"]

# ── Monitoring: Prometheus, Node Exporter, DB Exporters ────────────────────

[[stack]]
name = "monitoring"
description = "Prometheus, node-exporter, postgres/mongo/technitium exporters"
tags = ["mac-mini"]
deploy = true
[stack.config]
server = "mac-mini-m4"
repo = "amerenda/mac-mini-compose"
branch = "main"
file_paths = ["monitoring/compose.yaml"]
git_account = "amerenda"
[stack.config.pre_deploy]
command = """
export BWS_ACCESS_TOKEN=$(cat /run/secrets/bws-access-token)
bws secret list --project-id PLACEHOLDER_MONITORING_PROJECT_ID --access-token "$BWS_ACCESS_TOKEN" | jq -r '.[] | "\(.key)=\(.value)"' > monitoring/.env
bws secret get PLACEHOLDER_HA_PROMETHEUS_TOKEN --access-token "$BWS_ACCESS_TOKEN" | jq -r .value > monitoring/ha-token
"""

# ── Runners: GitHub Actions self-hosted runners ───────────────────────────

[[stack]]
name = "runners"
description = "GitHub Actions runners (k3s-runners, ecdysis, llm-manager, llm-agents)"
tags = ["mac-mini"]
deploy = true
[stack.config]
server = "mac-mini-m4"
repo = "amerenda/mac-mini-compose"
branch = "main"
file_paths = ["runners/compose.yaml"]
git_account = "amerenda"
[stack.config.pre_deploy]
command = """
export BWS_ACCESS_TOKEN=$(cat /run/secrets/bws-access-token)
printf 'DOCKERHUB_USERNAME=amerenda\nRUNNER_SCOPE=repo\nRUNNER_WORKDIR=/_work\nRANDOM_RUNNER_SUFFIX=false\n' > runners/compose.env
mkdir -p /etc/komodo/runner-secrets
bws secret get 2c57558f-d185-4410-ad9d-b385015c9302 --access-token "$BWS_ACCESS_TOKEN" | jq -r .value > /etc/komodo/runner-secrets/github-app-arc-id
bws secret get 0015f9ab-dd5e-4649-a262-b385015ceac1 --access-token "$BWS_ACCESS_TOKEN" | jq -r .value > /etc/komodo/runner-secrets/github-app-arc-private-key
bws secret get c5ad7fae-2f58-4a8b-9651-b413001cad7f --access-token "$BWS_ACCESS_TOKEN" | jq -r .value > /etc/komodo/runner-secrets/docker-hub-k3s-runner-api-key
bws secret get 42ea6b6b-3b1e-43d9-8743-b41301665cc9 --access-token "$BWS_ACCESS_TOKEN" | jq -r .value > /etc/komodo/runner-secrets/github-pat-k3s-dean-gitops
cp runners/entrypoint-wrapper.sh /etc/komodo/runner-secrets/entrypoint-wrapper.sh
chmod +x /etc/komodo/runner-secrets/entrypoint-wrapper.sh
"""
