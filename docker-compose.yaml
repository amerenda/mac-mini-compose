  #     timeout: 5s
  #     retries: 3

  # ============================================================
  # HACS — one-shot install into the HA config volume
  # ============================================================
  hacs-init:
    image: alpine:3
    container_name: hacs-init
    volumes:
      - ha-config:/config
    command: >
      sh -c '
      if [ -d /config/custom_components/hacs ]; then echo "HACS already installed"; exit 0; fi
      && apk add --no-cache wget unzip
      && wget -qO /tmp/hacs.zip https://github.com/hacs/integration/releases/latest/download/hacs.zip
      && mkdir -p /config/custom_components/hacs
      && unzip -o /tmp/hacs.zip -d /config/custom_components/hacs
      && echo "HACS installed"'
    labels:
      komodo.skip:

  # ============================================================
  # Home Assistant — Smart home hub
  # Uses host networking for mDNS/SSDP device discovery
  # ============================================================
  homeassistant:
    image: ghcr.io/home-assistant/home-assistant:2026.3.4
    container_name: homeassistant
    restart: unless-stopped
    depends_on:
      hacs-init:
        condition: service_completed_successfully
    network_mode: host
    environment:
      TZ: "America/New_York"
    volumes:
      - ha-config:/config
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8123/manifest.json"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s

  # Whisper disabled — image not available for ARM.
  # TODO: Use whisper.cpp natively on Mac Mini for Metal acceleration.

  # ============================================================
  # Monitoring exporters — scraped by Prometheus on k3s
  # ============================================================
  node-exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter
    restart: unless-stopped
    ports:
      - "9100:9100"
    command:
      - '--path.rootfs=/host'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    volumes:
      - /:/host:ro,rslave
    pid: host

  # pihole-exporter:
