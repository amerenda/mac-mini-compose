  #     PIHOLE_HOSTNAME: "pihole"
  #     PIHOLE_PASSWORD: "${PIHOLE_WEBPASSWORD}"
  #     PORT: "9617"

volumes:
  # pihole-data:
  # pihole-dnsmasq:
  ha-config:

networks:
  default:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/24
