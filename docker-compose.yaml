services:
  # ============================================================
  # Technitium DNS — authoritative + ad-blocking
  # Replaces Pi-hole + BIND9 on k3s
  # OrbStack intercepts *:53 and *:5353 (mDNS) and doesn't forward LAN
  # UDP to port-mapped containers. Using network_mode: host with Technitium
  # configured to listen on 5354 (set via web UI) bypasses both issues.
  # A macOS pf rule will redirect 10.100.20.18:53 → 5354 at cutover.
  # ============================================================
  technitium:
    image: technitium/dns-server:latest
    container_name: technitium
    restart: unless-stopped
    network_mode: host
    environment:
      TZ: "America/New_York"
      DNS_SERVER_DOMAIN: "dns.amer.home"
      DNS_SERVER_ADMIN_PASSWORD: "${TECHNITIUM_ADMIN_PASSWORD}"
    volumes:
      - technitium-data:/etc/dns
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:5380/"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ============================================================
  # BIND9 — Authoritative DNS (primary)
  # Disabled — not migrated yet. Uncomment when ready.
  # ============================================================
  # bind9:
  #   image: ubuntu/bind9:latest
  #   container_name: bind9
  #   restart: unless-stopped
  #   ports:
  #     - "5353:53/tcp"
  #     - "5353:53/udp"
  #   networks:
  #     default:
  #       ipv4_address: 172.20.0.10
  #   volumes:
  #     - ./bind9/named.conf:/etc/bind/named.conf:ro
  #     - ./bind9/keys:/etc/bind/keys:ro
  #     - ./bind9/zones:/var/cache/bind

  # ============================================================
  # Pihole — Ad-blocking DNS resolver
  # Disabled — not migrated yet. Uncomment when ready.
  # ============================================================
  # pihole:
  #   image: pihole/pihole:latest
  #   container_name: pihole
  #   restart: unless-stopped
  #   depends_on:
  #     - bind9
  #   network_mode: host
  #   environment:
  #     TZ: "America/New_York"
  #     WEBPASSWORD: "${PIHOLE_WEBPASSWORD}"
  #     DNSMASQ_LISTENING: "all"
  #     PIHOLE_DNS_: "1.1.1.1;1.0.0.1;8.8.8.8;8.8.4.4"
  #     FTLCONF_LOCAL_IPV4: "10.100.20.18"
  #     FTLCONF_dns_cache_size: "10000"
  #     CACHE_QUERY_MINIMUM_TTL: "0"
  #     CACHE_QUERY_MAXIMUM_TTL: "300"
  #   volumes:
  #     - pihole-data:/etc/pihole
  #     - pihole-dnsmasq:/etc/dnsmasq.d
  #     - ./pihole/dnsmasq/05-custom.conf:/etc/dnsmasq.d/05-custom.conf:ro
  #     - ./pihole/allowlist.txt:/etc/pihole/allowlist.txt:ro
  #   healthcheck:
  #     test: ["CMD", "dig", "@127.0.0.1", "google.com", "+short"]
  #     interval: 30s
  #     timeout: 5s
  #     retries: 3

  # ============================================================
  # HA Init — one-shot: installs HACS + frontend cards
  # To update: bump versions in homeassistant/scripts/ha-init.sh
  # ============================================================
  hacs-init:
    image: alpine:3
    container_name: hacs-init
    volumes:
      - ha-config:/config
      - ./homeassistant/scripts/ha-init.sh:/ha-init.sh:ro
    command: ["sh", "/ha-init.sh"]
    labels:
      komodo.skip:

  # ============================================================
  # Home Assistant — Smart home hub
  # Uses host networking for mDNS/SSDP device discovery
  # ============================================================
  homeassistant:
    image: ghcr.io/home-assistant/home-assistant:2026.3.4
    container_name: homeassistant
    restart: unless-stopped
    depends_on:
      hacs-init:
        condition: service_completed_successfully
    network_mode: host
    environment:
      TZ: "America/New_York"
    volumes:
      - ha-config:/config
      - ./homeassistant/configuration/configuration.yaml:/config/configuration.yaml:ro
      - ./homeassistant/configuration/automations:/config/automations:ro
      - ./homeassistant/configuration/blueprints/automation:/config/blueprints/automation/_defaults:ro
      - ./homeassistant/configuration/scripts:/config/scripts:ro
      - ./homeassistant/configuration/helpers/generated/input_boolean:/config/helpers/input_boolean:ro
      - ./homeassistant/configuration/helpers/generated/input_datetime:/config/helpers/input_datetime:ro
      - ./homeassistant/configuration/helpers/generated/input_select:/config/helpers/input_select:ro
      - ./homeassistant/configuration/helpers/generated/input_number:/config/helpers/input_number:ro
      - ./homeassistant/configuration/helpers/generated/input_text:/config/helpers/input_text:ro
      - ./homeassistant/configuration/helpers/generated/timer:/config/helpers/timer:ro
      - ./homeassistant/configuration/dashboards:/config/dashboards/views:ro
      - ./homeassistant/configuration/scenes.yaml:/config/scenes.yaml
      - ./homeassistant/scripts/subway_status.sh:/config/scripts_shell/subway_status.sh:ro
      - ./homeassistant/configuration/groups.yaml:/config/groups.yaml:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8123/manifest.json"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s

  # ============================================================
  # Voice Pipeline — Wyoming protocol services for HA Assist
  # Ollama runs natively on macOS for Metal GPU acceleration
  # (not in Docker — Docker on Mac has no GPU access)
  # ============================================================
  whisper:
    image: rhasspy/wyoming-whisper
    container_name: whisper
    restart: unless-stopped
    ports:
      - "10300:10300"
    volumes:
      - whisper-data:/data
    command: --model tiny-int8 --language en --beam-size 1

  piper:
    image: rhasspy/wyoming-piper
    container_name: piper
    restart: unless-stopped
    ports:
      - "10200:10200"
    volumes:
      - piper-data:/data
    command: --voice en_US-lessac-medium

  openwakeword:
    image: rhasspy/wyoming-openwakeword
    container_name: openwakeword
    restart: unless-stopped
    ports:
      - "10400:10400"
    command: --preload-model ok_nabu

  # ============================================================
  # Postgres — Unified PostgreSQL instance (pgvector/pg16)
  # Port 5432 (standard).
  # ============================================================
  postgres:
    image: pgvector/pgvector:pg16
    container_name: postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres/init.sh:/docker-entrypoint-initdb.d/init.sh:ro
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "${MINI_POSTGRES_PASSWORD}"
      MINI_POSTGRES_TODO_PASSWORD: "${MINI_POSTGRES_TODO_PASSWORD}"
      AGENT_KB_PASSWORD: "${AGENT_KB_PASSWORD}"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 30s
      timeout: 5s
      retries: 3


  # ============================================================
  # MongoDB — Shared instance (port 27017)
  # Databases: unifi
  # ============================================================
  mongo:
    image: mongo:4.4.10
    container_name: mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
      - ./mongo/init-unifi.sh:/docker-entrypoint-initdb.d/init-unifi.sh:ro
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: "${MONGO_PASSWORD}"
      MONGO_INITDB_DATABASE: unifi
    healthcheck:
      test: ["CMD", "mongo", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ============================================================
  # Mosquitto — MQTT broker (used by Zigbee2MQTT + HA)
  # ============================================================
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: mosquitto
    restart: unless-stopped
    volumes:
      - mosquitto-data:/mosquitto/data
      - ./mosquitto/config:/mosquitto/config:ro
    ports:
      - "1883:1883"

  # ============================================================
  # Zigbee2MQTT — Zigbee coordinator bridge
  # Connects to SMLIGHT SLZB-06MG24 at 10.100.20.179:6638
  # ============================================================
  zigbee2mqtt:
    image: koenkk/zigbee2mqtt:latest
    container_name: zigbee2mqtt
    restart: unless-stopped
    depends_on:
      - mosquitto
    volumes:
      - zigbee2mqtt-data:/app/data
      - ./zigbee2mqtt/external_extensions/smart-lighting.js:/app/data/external_extensions/smart-lighting.js:ro
    ports:
      - "8099:8099"
    environment:
      TZ: "America/New_York"

  # ============================================================
  # Postgres Backup — pg_dump | gzip → GCS via HMAC (S3-compat)
  # Runs daily at 02:00. Retention: 7 backups per database.
  # Databases: todo, agent_kb, argo_workflows
  # ============================================================
  postgres-backup:
    image: alpine:3
    container_name: postgres-backup
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./postgres/backup.sh:/backup.sh:ro
    environment:
      PGHOST: "10.100.20.18"
      PGPORT: "5432"
      PGUSER: "postgres"
      PGPASSWORD: "${MINI_POSTGRES_PASSWORD}"
      AWS_ACCESS_KEY_ID: "${BACKUP_ACCESS_KEY}"
      AWS_SECRET_ACCESS_KEY: "${BACKUP_SECRET_KEY}"
      BACKUP_ENDPOINT: "${BACKUP_ENDPOINT}"
      BACKUP_BUCKET: "amerenda-backups"
      BACKUP_BUCKET_PATH: "us/mac-mini/dean"
    command: >
      sh -c "
        apk add --no-cache postgresql16-client s3cmd &&
        echo '0 2 * * * sh /backup.sh >> /var/log/backup.log 2>&1' | crontab - &&
        crond -f -l 8
      "

  # ============================================================
  # MongoDB Backup — mongodump | gzip → GCS via HMAC (s3cmd)
  # Runs daily at 02:15. Retention: 7 backups.
  # ============================================================
  mongo-backup:
    image: alpine:3
    container_name: mongo-backup
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
    volumes:
      - ./mongo/backup.sh:/backup.sh:ro
    environment:
      MONGO_HOST: "mongo"
      MONGO_PORT: "27017"
      MONGO_USER: "root"
      MONGO_PASSWORD: "${MONGO_PASSWORD}"
      AWS_ACCESS_KEY_ID: "${BACKUP_ACCESS_KEY}"
      AWS_SECRET_ACCESS_KEY: "${BACKUP_SECRET_KEY}"
      BACKUP_ENDPOINT: "${BACKUP_ENDPOINT}"
      BACKUP_BUCKET: "amerenda-backups"
      BACKUP_BUCKET_PATH: "us/mac-mini/dean"
    command: >
      sh -c "
        apk add --no-cache mongodb-tools s3cmd &&
        echo '15 2 * * * sh /backup.sh >> /var/log/backup.log 2>&1' | crontab - &&
        crond -f -l 8
      "

  # ============================================================
  # Secrets API — write-only BWS secret provisioning
  # POST /secrets → create secret. GET /secrets → list names/UUIDs.
  # Cannot read secret values or modify existing secrets.
  # ============================================================
  secrets-api:
    image: amerenda/secrets-api:latest
    container_name: secrets-api
    restart: unless-stopped
    ports:
      - "8090:8090"
    environment:
      BEARER_TOKEN: "${SECRETS_API_BEARER_TOKEN}"
      BWS_ACCESS_TOKEN: "${SECRETS_API_BWS_TOKEN}"
      BWS_PROJECT_ID: "6353f589-39c0-45f2-9e9c-b36f00e0c282"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8090/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ============================================================
  # Monitoring exporters — scraped by Prometheus on k3s
  # ============================================================
  node-exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter
    restart: unless-stopped
    ports:
      - "9100:9100"
    command:
      - '--path.rootfs=/host'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    volumes:
      - /:/host:ro,rslave
    pid: host

  # pihole-exporter:
  #   image: ekofr/pihole-exporter:latest
  #   container_name: pihole-exporter
  #   restart: unless-stopped
  #   depends_on:
  #     pihole:
  #       condition: service_healthy
  #   ports:
  #     - "9617:9617"
  #   environment:
  #     PIHOLE_HOSTNAME: "pihole"
  #     PIHOLE_PASSWORD: "${PIHOLE_WEBPASSWORD}"
  #     PORT: "9617"

volumes:
  # pihole-data:
  # pihole-dnsmasq:
  technitium-data:
  mongo-data:
  postgres-data:
  ha-config:
  whisper-data:
  piper-data:
  mosquitto-data:
  zigbee2mqtt-data:

networks:
  default:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/24
