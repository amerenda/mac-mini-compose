apiVersion: 1

# Drop any existing Prometheus row first so a stale uid/id from an older Grafana never blocks provisioned uid=prometheus.
deleteDatasources:
  - name: Prometheus
    orgId: 1

datasources:
  - name: Prometheus
    uid: prometheus
    orgId: 1
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: true
    jsonData:
      httpMethod: POST
