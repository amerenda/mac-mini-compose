// BIND9 Primary — authoritative for amer.home, merenda.home.arpa, reverse DNS
// ExternalDNS (k3s) writes records via RFC2136 + TSIG
// k3s BIND9 secondary pulls zones via AXFR

options {
    directory "/var/cache/bind";
    listen-on port 53 { any; };
    allow-query { any; };
    recursion no;
};

include "/etc/bind/keys/key.conf";

zone "amer.home" IN {
    type master;
    file "/var/cache/bind/amer.home.db";
    allow-update { key "externaldns-key."; };
    allow-transfer { key "externaldns-key."; 10.100.20.241; };
    also-notify { 10.100.20.241; };
};

zone "merenda.home.arpa" IN {
    type master;
    file "/var/cache/bind/merenda.home.arpa.db";
    allow-update { key "externaldns-key."; };
    allow-transfer { key "externaldns-key."; 10.100.20.241; };
    also-notify { 10.100.20.241; };
};

zone "20.100.10.in-addr.arpa" IN {
    type master;
    file "/var/cache/bind/20.100.10.in-addr.arpa.db";
    allow-update { key "externaldns-key."; };
    allow-transfer { key "externaldns-key."; 10.100.20.241; };
    also-notify { 10.100.20.241; };
};
