# llm-manager stack on murderbot — agent + compose-managed Ollama.
#
# Ollama data (keys, config) → /root/.ollama; models stored separately at OLLAMA_MODELS_HOST_PATH
# (defaults to /mnt/storage/models) and mapped to /mnt/models inside the container via OLLAMA_MODELS.
name: llm-murderbot

services:
  ollama:
    image: ollama/ollama:${OLLAMA_IMAGE_TAG:-0.23.0}
    pull_policy: always
    container_name: ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    env_file:
      - ollama.env
      - ollama.ui.env
    environment:
      OLLAMA_HOST: 0.0.0.0:11434
      OLLAMA_MODELS: /mnt/models
    volumes:
      - ${OLLAMA_DATA_HOST_PATH:-/mnt/storage/.ollama}:/root/.ollama
      - ${OLLAMA_MODELS_HOST_PATH:-/mnt/storage/models}:/mnt/models
    # NVIDIA: requires nvidia-container-toolkit + working driver (nvidia-smi on host).
    gpus: all

  # vLLM: opt-in via `docker compose --profile vllm up` (or COMPOSE_PROFILES=vllm).
  # Do NOT run alongside Ollama on the same GPU — no sharing yet.
  # VLLM_MODEL is set via vllm.env (UI-configurable via ollama.ui.env VLLM_MODEL override).
  vllm:
    image: vllm/vllm-openai:${VLLM_IMAGE_TAG:-latest}
    pull_policy: always
    container_name: vllm
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - vllm.env
    environment:
      HF_HOME: /mnt/hf-cache
    volumes:
      - ${VLLM_MODELS_HOST_PATH:-/mnt/storage/models/vllm}:/mnt/hf-cache
    ipc: host
    gpus: all
    profiles:
      - vllm
    command:
      - "--model"
      - "${VLLM_MODEL}"
      - "--gpu-memory-utilization"
      - "${VLLM_GPU_MEM_UTIL:-0.9}"

  llm-agent:
    image: amerenda/llm-manager:agent-${AGENT_IMAGE_TAG:-latest}
    pull_policy: always
    container_name: llm-agent
    restart: unless-stopped
    ports:
      - "8090:8090"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    env_file:
      - .env
    environment:
      RUNNER_HOSTNAME: murderbot
      OLLAMA_URL: http://ollama:11434
      OLLAMA_CONTAINER: ollama
      BACKEND_TYPE: ${BACKEND_TYPE:-ollama}
      VLLM_URL: http://vllm:8000
      COMPOSE_PROFILE: ""
      COMPOSE_DIR: ${HOST_LLM_COMPOSE_DIR}
      COMPOSE_DIR_LOCAL: /host/llm-compose
      MODEL_STORAGE_PATH: /host-ollama-models
    depends_on:
      - ollama
    volumes:
      - llm-agent-tls:/data/tls
      - /var/run/docker.sock:/var/run/docker.sock
      - /:/hostfs:ro
      - ${OLLAMA_MODELS_HOST_PATH:-/home/alex/.ollama/models}:/host-ollama-models:ro
      - ${HOST_LLM_COMPOSE_DIR}:/host/llm-compose:rw
      # Do not bind-mount /proc/driver/nvidia into /proc/... — runc rejects it ("inside /proc")
      # and llm-agent stays stuck in Created. Driver text in the UI comes from NVML when available.
    gpus: all

volumes:
  llm-agent-tls:
