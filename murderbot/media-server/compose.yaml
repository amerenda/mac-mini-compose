name: media-server

# Komodo-managed stack on the murderbot (Debian) Periphery host.
# This stack now relies on k3s Traefik + cert-manager ingress for HTTPS/public routing.
# Config bind-mount root (/mnt/storage/media/config) and library root
# (/mnt/storage) are pre-created with owner 1000:1000 by setup-debian-komodo.yml.

x-dns: &dns-servers
  - 1.1.1.1
  - 8.8.8.8

services:
  profilarr:
    container_name: profilarr
    image: santiagosayshey/profilarr:latest
    ports:
      - 6868:6868
    volumes:
      - ${PROFILARR_CONFIG}:/config
    environment:
      - TZ=America/New_York
    networks:
      servarr:
    dns: *dns-servers
    restart: unless-stopped

  prowlarr:
    container_name: prowlarr
    image: linuxserver/prowlarr:latest
    networks:
      servarr:
    dns: *dns-servers
    ports:
      - 9696:9696
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/New_York
    volumes:
      - ${PROWLARR_CONFIG}:/config
    restart: unless-stopped

  sabnzbd:
    image: lscr.io/linuxserver/sabnzbd:latest
    container_name: sabnzbd
    networks:
      servarr:
    dns: *dns-servers
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/New_York
    ports:
      - 8081:8080
    volumes:
      - ${SABNZBD_CONFIG}:/config
      - ${USENET_DOWNLOADS}:/downloads
      - ${USENET_DOWNLOADS_INCOMPLETE}:/incomplete-downloads
    restart: unless-stopped

  radarr:
    container_name: radarr
    image: lscr.io/linuxserver/radarr:latest
    networks:
      servarr:
    dns: *dns-servers
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/New_York
    ports:
      - 7878:7878
    volumes:
      - ${RADARR_CONFIG}:/config
      - ${MOVIES_FOLDER}:/movies
      - ${USENET_DOWNLOADS}:/downloads
    restart: unless-stopped

  sonarr:
    image: linuxserver/sonarr:latest
    container_name: sonarr
    networks:
      servarr:
    dns: *dns-servers
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/New_York
    volumes:
      - ${SONARR_CONFIG}:/config
      - ${TV_FOLDER}:/tv
      - ${USENET_DOWNLOADS}:/downloads
      - ${SONARR_SCRIPTS}:/scripts
    ports:
      - 8989:8989
    restart: unless-stopped

  bazarr:
    container_name: bazarr
    image: linuxserver/bazarr:latest
    networks:
      servarr:
    dns: *dns-servers
    ports:
      - 6767:6767
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/New_York
    volumes:
      - ${BAZARR_CONFIG}:/config
      - ${TV_FOLDER}:/tv
      - ${MOVIES_FOLDER}:/movies
    restart: unless-stopped

  jellyfin:
    image: linuxserver/jellyfin:10.11.8
    container_name: jellyfin
    networks:
      servarr:
    dns: *dns-servers
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/New_York
      - JELLYFIN_PublishedServerUrl=$JELLYFIN_URL
      # VAAPI via nvidia-vaapi-driver (avoids CUDA context; works alongside llama.cpp).
      # Requires: sudo apt install nvidia-vaapi-driver (provides nvidia_drv_video.so).
      # After install, enable VAAPI in Jellyfin Dashboard → Playback → Transcoding.
      - LIBVA_DRIVER_NAME=nvidia
      - LIBVA_DRIVERS_PATH=/usr/lib/x86_64-linux-gnu/dri
    volumes:
      - ${JELLYFIN_CONFIG}:/config
      - ${MOVIES_FOLDER}:/movies
      - ${TV_FOLDER}:/tv
      - ${DISCOVER_FOLDER}:/discover
      - ${TRANSCODE_FOLDER}:/transcode
      # --- VAAPI / nvidia-vaapi-driver ---
      # The driver .so itself (installed on host via apt install nvidia-vaapi-driver).
      - /usr/lib/x86_64-linux-gnu/dri/nvidia_drv_video.so:/usr/lib/x86_64-linux-gnu/dri/nvidia_drv_video.so:ro
      # GLVND EGL dispatcher + its internal dep, and the NVIDIA EGL ICD it dispatches to.
      - /usr/lib/x86_64-linux-gnu/libEGL.so.1:/usr/lib/x86_64-linux-gnu/libEGL.so.1:ro
      - /usr/lib/x86_64-linux-gnu/libGLdispatch.so.0:/usr/lib/x86_64-linux-gnu/libGLdispatch.so.0:ro
      - /usr/lib/x86_64-linux-gnu/libEGL_nvidia.so.0:/usr/lib/x86_64-linux-gnu/libEGL_nvidia.so.0:ro
      - /usr/share/glvnd/egl_vendor.d/10_nvidia.json:/usr/share/glvnd/egl_vendor.d/10_nvidia.json:ro
      # GStreamer codec-parsers (direct dep of nvidia_drv_video.so) + its cascade.
      - /usr/lib/x86_64-linux-gnu/libgstcodecparsers-1.0.so.0:/usr/lib/x86_64-linux-gnu/libgstcodecparsers-1.0.so.0:ro
      - /usr/lib/x86_64-linux-gnu/libgstbase-1.0.so.0:/usr/lib/x86_64-linux-gnu/libgstbase-1.0.so.0:ro
      - /usr/lib/x86_64-linux-gnu/libgstreamer-1.0.so.0:/usr/lib/x86_64-linux-gnu/libgstreamer-1.0.so.0:ro
      - /usr/lib/x86_64-linux-gnu/libglib-2.0.so.0:/usr/lib/x86_64-linux-gnu/libglib-2.0.so.0:ro
      - /usr/lib/x86_64-linux-gnu/libgobject-2.0.so.0:/usr/lib/x86_64-linux-gnu/libgobject-2.0.so.0:ro
      - /usr/lib/x86_64-linux-gnu/libgmodule-2.0.so.0:/usr/lib/x86_64-linux-gnu/libgmodule-2.0.so.0:ro
      - /usr/lib/x86_64-linux-gnu/libatomic.so.1:/usr/lib/x86_64-linux-gnu/libatomic.so.1:ro
      # Already in container: libffi.so.8, libpcre2-8.so.0, libm.so.6, libc.so.6
    ports:
      - 8096:8096
      - 7359:7359/udp
      - 8920:8920
    # nvidia-container-toolkit injects CUDA/NVENC/NVDEC libs + libEGL_nvidia.so.595.58.03.
    # /dev/dri for VAAPI device access.
    gpus: all
    devices:
      - /dev/dri:/dev/dri
    restart: unless-stopped

  seerr:
    image: ghcr.io/seerr-team/seerr:latest
    init: true
    container_name: seerr
    networks:
      servarr:
    dns: *dns-servers
    environment:
      - TZ=America/New_York
      - PORT=5055
    ports:
      - 5055:5055
    volumes:
      - ${SEERR_CONFIG}:/app/config
    healthcheck:
      test: wget --no-verbose --tries=1 --spider http://localhost:5055/api/v1/settings/public || exit 1
      start_period: 20s
      timeout: 3s
      interval: 15s
      retries: 3
    restart: unless-stopped

networks:
  servarr:
    driver: bridge
