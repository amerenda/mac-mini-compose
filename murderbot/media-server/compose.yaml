name: media-server

# Komodo-managed stack on the murderbot (Debian) Periphery host.
# This stack now relies on k3s Traefik + cert-manager ingress for HTTPS/public routing.
# Config bind-mount root (/mnt/storage/media/config) and library root
# (/mnt/storage) are pre-created with owner 1000:1000 by setup-debian-komodo.yml.

x-dns: &dns-servers
  - 1.1.1.1
  - 8.8.8.8

services:
  profilarr:
    container_name: profilarr
    image: santiagosayshey/profilarr:latest
    ports:
      - 6868:6868
    volumes:
      - ${PROFILARR_CONFIG}:/config
    environment:
      - TZ=America/New_York
    networks:
      servarr:
    dns: *dns-servers
    restart: unless-stopped

  prowlarr:
    container_name: prowlarr
    image: linuxserver/prowlarr:latest
    networks:
      servarr:
    dns: *dns-servers
    ports:
      - 9696:9696
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/New_York
    volumes:
      - ${PROWLARR_CONFIG}:/config
    restart: unless-stopped

  sabnzbd:
    image: lscr.io/linuxserver/sabnzbd:latest
    container_name: sabnzbd
    networks:
      servarr:
    dns: *dns-servers
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/New_York
    ports:
      - 8080:8080
    volumes:
      - ${SABNZBD_CONFIG}:/config
      - ${USENET_DOWNLOADS}:/downloads
      - ${USENET_DOWNLOADS_INCOMPLETE}:/incomplete-downloads
    restart: unless-stopped

  radarr:
    container_name: radarr
    image: lscr.io/linuxserver/radarr:latest
    networks:
      servarr:
    dns: *dns-servers
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/New_York
    ports:
      - 7878:7878
    volumes:
      - ${RADARR_CONFIG}:/config
      - ${MOVIES_FOLDER}:/movies
      - ${USENET_DOWNLOADS}:/downloads
    restart: unless-stopped

  sonarr:
    image: linuxserver/sonarr:latest
    container_name: sonarr
    networks:
      servarr:
    dns: *dns-servers
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/New_York
    volumes:
      - ${SONARR_CONFIG}:/config
      - ${TV_FOLDER}:/tv
      - ${USENET_DOWNLOADS}:/downloads
      - ${SONARR_SCRIPTS}:/scripts
    ports:
      - 8989:8989
    restart: unless-stopped

  bazarr:
    container_name: bazarr
    image: linuxserver/bazarr:latest
    networks:
      servarr:
    dns: *dns-servers
    ports:
      - 6767:6767
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/New_York
    volumes:
      - ${BAZARR_CONFIG}:/config
      - ${TV_FOLDER}:/tv
      - ${MOVIES_FOLDER}:/movies
    restart: unless-stopped

  jellyfin:
    image: linuxserver/jellyfin:10.11.4
    container_name: jellyfin
    networks:
      servarr:
    dns: *dns-servers
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/New_York
      - JELLYFIN_PublishedServerUrl=$JELLYFIN_URL
    volumes:
      - ${JELLYFIN_CONFIG}:/config
      - ${MOVIES_FOLDER}:/movies
      - ${TV_FOLDER}:/tv
      - ${TRANSCODE_FOLDER}:/transcode
    ports:
      - 8096:8096
      - 7359:7359/udp
      - 8920:8920
    devices:
      - /dev/dri:/dev/dri
    restart: unless-stopped

networks:
  servarr:
    driver: bridge
