# Rebuild scenes ONLY on HA start (once, after 30s)
# Manual rebuild via "Apply Defaults" button on dashboard
alias: "SL: Rebuild Scenes on Start"
id: sl_rebuild_on_default_change
trigger:
  - platform: homeassistant
    event: start
action:
  - delay:
      seconds: 30
  - service: script.sl_rebuild_scenes
mode: single
