# Smart Lighting v2 — Bedroom motion auto-off
alias: "SL: Bedroom — Motion Off"
id: sl_bedroom_motion_off
trigger:
  - platform: event
    event_type: timer.finished
    event_data:
      entity_id: timer.sl_bedroom_motion_off
condition:
  - condition: state
    entity_id: input_boolean.sl_enabled
    state: "on"
action:
  - service: script.sl_room_off
    data:
      room: bedroom
mode: single
enabled: false
