alias: "Camera - Sync Bedroom LED to Privacy State"
description: "LED follows privacy switch immediately regardless of what triggered the change."
mode: "restart"
triggers:
  - trigger: state
    entity_id: switch.bedroom_privacy_mode
    to: "on"
  - trigger: state
    entity_id: switch.bedroom_privacy_mode
    to: "off"
actions:
  - choose:
      - conditions:
          - condition: state
            entity_id: switch.bedroom_privacy_mode
            state: "on"
        sequence:
          - action: light.turn_off
            target:
              entity_id: light.bedroom_status_led
      - conditions:
          - condition: state
            entity_id: switch.bedroom_privacy_mode
            state: "off"
        sequence:
          - action: light.turn_on
            target:
              entity_id: light.bedroom_status_led
