# Smart Lighting v2 — Hallway state-change trigger
alias: "SL: Hallway — Light On"
id: sl_hallway_light_on
trigger:
  - platform: state
    entity_id: light.hallway
    to: "on"
condition:
  - condition: state
    entity_id: input_boolean.sl_enabled
    state: "on"
action:
  - delay:
      milliseconds: 500
  - service: script.sl_room_on
    data:
      room: hallway
mode: restart
