# Smart Lighting v2 — Living Room state-change trigger
alias: "SL: Living Room — Light On"
id: sl_living_room_light_on
trigger:
  - platform: state
    entity_id: light.living_room
    from: "off"
    to: "on"
condition:
  - condition: state
    entity_id: input_boolean.sl_enabled
    state: "on"
action:
  - service: script.sl_room_on
    data:
      room: living_room
mode: restart
