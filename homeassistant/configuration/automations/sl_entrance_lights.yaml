# Smart Lighting v2 — Entrance Lights state-change trigger
alias: "SL: Entrance Lights — Light On"
id: sl_entrance_lights_light_on
trigger:
  - platform: state
    entity_id: light.entrance_lights
    to: "on"
condition:
  - condition: state
    entity_id: input_boolean.sl_enabled
    state: "on"
action:
  - delay:
      milliseconds: 500
  - service: script.sl_room_on
    data:
      room: entrance_lights
mode: restart
