# Smart Lighting v2 — Entrance Lights motion auto-off
alias: "SL: Entrance Lights — Motion Off"
id: sl_entrance_lights_motion_off
trigger:
  - platform: event
    event_type: timer.finished
    event_data:
      entity_id: timer.sl_entrance_lights_motion_off
condition:
  - condition: state
    entity_id: input_boolean.sl_enabled
    state: "on"
action:
  - service: script.sl_room_off
    data:
      room: entrance_lights
mode: single
