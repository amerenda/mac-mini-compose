# Smart Lighting v2 — Bedroom state-change trigger
alias: "SL: Bedroom — Light On"
id: sl_bedroom_light_on
trigger:
  - platform: state
    entity_id: light.bedroom
    from: "off"
    to: "on"
condition:
  - condition: state
    entity_id: input_boolean.sl_enabled
    state: "on"
action:
  - service: script.sl_room_on
    data:
      room: bedroom
mode: restart
