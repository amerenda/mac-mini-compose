alias: "SL: Apply current window when room light turns on"
id: sl_apply_window_when_light_on
description: >
  When a light goes from off to on (dashboard, voice, etc.), apply the correct scene
  for the current time window via script.sl_room_on. Without this, Hue/Z2M restores
  the previous brightness/color (e.g. Morning) even when the window is Day.
mode: restart
max_exceeded: silent
trigger:
  - platform: state
    entity_id: light.living_room_1
    from: "off"
    to: "on"
    id: living_room
  - platform: state
    entity_id:
      - light.bedroom_1
      - light.bedroom_2
      - light.lamp_1
    from: "off"
    to: "on"
    id: bedroom
  - platform: state
    entity_id: light.bathroom_1
    from: "off"
    to: "on"
    id: bathroom
  - platform: state
    entity_id:
      - light.kitchen_1
      - light.kitchen_2
    from: "off"
    to: "on"
    id: kitchen
  - platform: state
    entity_id: light.hallway_1
    from: "off"
    to: "on"
    id: hallway
condition:
  - condition: state
    entity_id: input_boolean.sl_enabled
    state: "on"
action:
  - service: script.sl_room_on
    data:
      room: "{{ trigger.id }}"
