alias: "System - Monitor Camera Privacy"
initial_state: true
mode: "single"
triggers:
  - trigger: "time_pattern"
    minutes: "/1"
conditions:
  - condition: "template"
    value_template: >
      {{ states('switch.bedroom_privacy_mode') != 'unavailable'
         or states('switch.living_room_privacy_mode') != 'unavailable' }}
actions:
  # Step 1: set privacy mode based on presence
  - action: script.manage_camera_privacy
  # Step 2: enforce LED matches actual switch state (covers any drift)
  - choose:
      - conditions:
          - condition: state
            entity_id: switch.bedroom_privacy_mode
            state: "on"
        sequence:
          - action: light.turn_off
            target:
              entity_id: light.bedroom_status_led
      - conditions:
          - condition: state
            entity_id: switch.bedroom_privacy_mode
            state: "off"
        sequence:
          - action: light.turn_on
            target:
              entity_id: light.bedroom_status_led
  - choose:
      - conditions:
          - condition: state
            entity_id: switch.living_room_privacy_mode
            state: "on"
        sequence:
          - action: light.turn_off
            target:
              entity_id: light.living_room_status_led
      - conditions:
          - condition: state
            entity_id: switch.living_room_privacy_mode
            state: "off"
        sequence:
          - action: light.turn_on
            target:
              entity_id: light.living_room_status_led
