# Smart Lighting v2 — Kitchen motion auto-off
alias: "SL: Kitchen — Motion Off"
id: sl_kitchen_motion_off
trigger:
  - platform: event
    event_type: timer.finished
    event_data:
      entity_id: timer.sl_kitchen_motion_off
condition:
  - condition: state
    entity_id: input_boolean.sl_enabled
    state: "on"
action:
  - service: script.sl_room_off
    data:
      room: kitchen
mode: single
