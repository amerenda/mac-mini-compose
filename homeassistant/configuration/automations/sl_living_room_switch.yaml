# Living Room Hue Dimmer — uses SL blueprint with defaults
alias: "SL: Living Room — Switch"
id: sl_living_room_switch
use_blueprint:
  path: _defaults/sl_hue_dimmer.yaml
  input:
    switch_action_topic: zigbee2mqtt/living_room_s_0/action
    room: living_room
    light_entity: light.living_room
    min_brightness_pct: 20
