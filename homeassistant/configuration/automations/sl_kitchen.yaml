# Smart Lighting v2 — Kitchen state-change trigger
alias: "SL: Kitchen — Light On"
id: sl_kitchen_light_on
trigger:
  - platform: state
    entity_id: light.kitchen
    from: "off"
    to: "on"
condition:
  - condition: state
    entity_id: input_boolean.sl_enabled
    state: "on"
action:
  - service: script.sl_room_on
    data:
      room: kitchen
mode: restart
