# Smart Lighting v2 — Bathroom state-change trigger
alias: "SL: Bathroom — Light On"
id: sl_bathroom_light_on
trigger:
  - platform: state
    entity_id: light.bathroom
    from: "off"
    to: "on"
condition:
  - condition: state
    entity_id: input_boolean.sl_enabled
    state: "on"
action:
  - service: script.sl_room_on
    data:
      room: bathroom
mode: restart
