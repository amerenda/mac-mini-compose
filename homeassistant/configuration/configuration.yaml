# Loads default set of integrations. Do not remove.
default_config: {}

# Load frontend themes from the themes folder
frontend:
  themes: !include_dir_merge_named themes

# Load UI-managed files for Automations & Scenes (so the UI keeps working)
automation: !include automations.yaml
automation manual: !include_dir_list automations
scene: !include scenes.yaml
group: !include groups.yaml

# Scripts managed as separate files under /config/scripts/*.yaml (dict merge)
script: !include_dir_merge_named scripts

# Input helpers (split by domain)
input_boolean:  !include_dir_merge_named helpers/input_boolean/
input_datetime: !include_dir_merge_named helpers/input_datetime/
input_select:   !include_dir_merge_named helpers/input_select/
input_number:   !include_dir_merge_named helpers/input_number/
input_text:     !include_dir_merge_named helpers/input_text/


# Timers (smart lighting motion auto-off)
timer: !include_dir_merge_named helpers/timer/

# Smart Lighting v2 — template sensor for current time window
template:
  - sensor:
      - name: "SL: Current Window"
        unique_id: sl_current_window
        icon: mdi:clock-time-four-outline
        state: >
          {% set day_names = ['monday','tuesday','wednesday','thursday','friday','saturday','sunday'] %}
          {% set today = day_names[now().weekday()] %}
          {% set profile = states('input_select.sl_profile_' ~ today) | default('weekday') %}
          {% set morning = states('input_datetime.sl_morning_start_' ~ profile) | default('06:00:00') %}
          {% set day_start = states('input_datetime.sl_day_start_' ~ profile) | default('09:00:00') %}
          {% set evening = states('input_datetime.sl_evening_start_' ~ profile) | default('17:00:00') %}
          {% set night = states('input_datetime.sl_night_start_' ~ profile) | default('22:00:00') %}
          {% set t = now().strftime('%H:%M:%S') %}
          {% if morning <= t < day_start %}morning
          {% elif day_start <= t < evening %}day
          {% elif evening <= t < night %}evening
          {% else %}night{% endif %}
        attributes:
          profile: >
            {% set day_names = ['monday','tuesday','wednesday','thursday','friday','saturday','sunday'] %}
            {% set today = day_names[now().weekday()] %}
            {{ states('input_select.sl_profile_' ~ today) | default('weekday') }}
          next_transition: >
            {% set day_names = ['monday','tuesday','wednesday','thursday','friday','saturday','sunday'] %}
            {% set today = day_names[now().weekday()] %}
            {% set profile = states('input_select.sl_profile_' ~ today) | default('weekday') %}
            {% set times = {
              'morning': states('input_datetime.sl_morning_start_' ~ profile),
              'day': states('input_datetime.sl_day_start_' ~ profile),
              'evening': states('input_datetime.sl_evening_start_' ~ profile),
              'night': states('input_datetime.sl_night_start_' ~ profile)
            } %}
            {% set t = now().strftime('%H:%M:%S') %}
            {% set upcoming = times | dictsort(by='value') | selectattr('1', 'gt', t) | first | default(none) %}
            {{ upcoming[1] if upcoming else times.values() | sort | first }}

homeassistant:
  media_dirs:
    pets: /config/www/pets
    intruders: /config/www/intruders

# MQTT sensors — Z2M Smart Lighting sync status
mqtt:
  sensor:
    - name: "SL: Z2M Sync Status"
      unique_id: sl_z2m_sync_status
      state_topic: "zigbee2mqtt/sl/status"
      value_template: "{{ value_json.status }}"
      json_attributes_topic: "zigbee2mqtt/sl/status"
      json_attributes_template: "{{ value_json | tojson }}"
      icon: mdi:sync

# Lovelace: storage mode + YAML dashboards
lovelace:
  mode: storage
  dashboards:
    dean-dashboard:
      mode: yaml
      title: Dean
      icon: mdi:home
      show_in_sidebar: true
      filename: dashboards/views/dean.yaml
    subway-dashboard:
      mode: yaml
      title: Subway
      icon: mdi:subway-variant
      show_in_sidebar: true
      filename: dashboards/views/subway.yaml
    security-dashboard:
      mode: yaml
      title: Security
      icon: mdi:cctv
      show_in_sidebar: true
      filename: dashboards/views/security.yaml
    uni-dashboard:
      mode: yaml
      title: Uni
      icon: mdi:cat
      show_in_sidebar: true
      filename: dashboards/views/uni.yaml
    smart-lighting-dashboard:
      mode: yaml
      title: Smart Lighting
      icon: mdi:lightbulb-auto
      show_in_sidebar: true
      filename: dashboards/views/smart_lighting.yaml

# MQTT — configured via HA UI (Settings > Integrations > MQTT)
# Broker: 127.0.0.1:1883 (Mosquitto on host network)

# HTTP reverse proxy
http:
  use_x_forwarded_for: true
  trusted_proxies:
    - 10.100.20.0/24
    - 10.43.0.0/16
    - 10.42.0.0/16
    - 127.0.0.1

# Prometheus metrics endpoint for Grafana dashboards
prometheus:
  namespace: homeassistant
  filter:
    include_domains:
      - light
      - switch
      - binary_sensor
      - sensor
      - automation
      - script
      - scene
      - input_boolean
      - input_select
      - input_number
      - input_datetime
      - input_text
      - person
      - device_tracker
      - event

# Media sources - expose local media folders to Media dashboard
media_source: {}

# Shell commands
shell_command:
  cleanup_old_photos: 'find /config/www/pets -name "*.jpg" -mtime +30 -delete && find /config/www/intruders -name "*.jpg" -mtime +30 -delete'
  subway_status_update: 'sh /config/scripts_shell/subway_status.sh'
