# Loads default set of integrations. Do not remove.
default_config: {}

# Load frontend themes from the themes folder
frontend:
  themes: !include_dir_merge_named themes

# Load UI-managed files for Automations & Scenes (so the UI keeps working)
automation: !include automations.yaml
automation manual: !include_dir_list automations
scene: !include scenes.yaml
group: !include groups.yaml

# Scripts managed as separate files under /config/scripts/*.yaml (dict merge)
script: !include_dir_merge_named scripts

# Input helpers (split by domain)
input_boolean:  !include_dir_merge_named helpers/input_boolean/
input_datetime: !include_dir_merge_named helpers/input_datetime/
input_select:   !include_dir_merge_named helpers/input_select/
input_number:   !include_dir_merge_named helpers/input_number/
input_text:     !include_dir_merge_named helpers/input_text/


# Timers (smart lighting motion auto-off)
timer: !include_dir_merge_named helpers/timer/

# Packages (loads your generated per-room helpers under packages/helpers/generated/)
homeassistant:
  packages: !include_dir_named packages/sl
  media_dirs:
    pets: /config/www/pets
    intruders: /config/www/intruders

# Lovelace: storage mode + YAML dashboards
lovelace:
  mode: storage
  dashboards:
    dean-dashboard:
      mode: yaml
      title: Dean
      icon: mdi:home
      show_in_sidebar: true
      filename: dashboards/views/dean.yaml
    room-schedule-viewer:
      mode: yaml
      title: Room Schedule Viewer
      icon: mdi:calendar-clock
      show_in_sidebar: true
      filename: dashboards/views/room_schedule_viewer.yaml
    room-schedule-configuration:
      mode: yaml
      title: Room Schedule Configuration
      icon: mdi:calendar-edit
      show_in_sidebar: true
      filename: dashboards/views/room_schedule_configuration.yaml
    subway-dashboard:
      mode: yaml
      title: Subway
      icon: mdi:subway-variant
      show_in_sidebar: true
      filename: dashboards/views/subway.yaml
    security-dashboard:
      mode: yaml
      title: Security
      icon: mdi:cctv
      show_in_sidebar: true
      filename: dashboards/views/security.yaml
    uni-dashboard:
      mode: yaml
      title: Uni
      icon: mdi:cat
      show_in_sidebar: true
      filename: dashboards/views/uni.yaml
    health-dashboard:
      mode: yaml
      title: Health
      icon: mdi:heart-pulse
      show_in_sidebar: true
      filename: dashboards/views/health.yaml
    sleep-dashboard:
      mode: yaml
      title: Sleep
      icon: mdi:sleep
      show_in_sidebar: true
      filename: dashboards/views/sleep.yaml
    tmp-health-mini:
      mode: yaml
      title: Health (mini-graph)
      icon: mdi:heart-pulse
      show_in_sidebar: true
      filename: dashboards/views/tmp_health_mini.yaml
    tmp-health-apex:
      mode: yaml
      title: Health (apex)
      icon: mdi:heart-pulse
      show_in_sidebar: true
      filename: dashboards/views/tmp_health_apex.yaml
    tmp-sleep-mini:
      mode: yaml
      title: Sleep (mini-graph)
      icon: mdi:sleep
      show_in_sidebar: true
      filename: dashboards/views/tmp_sleep_mini.yaml
    tmp-sleep-apex:
      mode: yaml
      title: Sleep (apex)
      icon: mdi:sleep
      show_in_sidebar: true
      filename: dashboards/views/tmp_sleep_apex.yaml
    smart-lighting-dashboard:
      mode: yaml
      title: Smart Lighting
      icon: mdi:lightbulb-auto
      show_in_sidebar: true
      filename: dashboards/views/smart_lighting.yaml

# HTTP reverse proxy
http:
  use_x_forwarded_for: true
  trusted_proxies:
    - 10.100.20.0/24
    - 10.43.0.0/16
    - 10.42.0.0/16
    - 127.0.0.1

# Prometheus metrics endpoint for Grafana dashboards
prometheus:
  namespace: homeassistant
  filter:
    include_domains:
      - light
      - switch
      - binary_sensor
      - sensor
      - automation
      - script
      - scene
      - input_boolean
      - input_select
      - input_number
      - input_datetime
      - input_text
      - person
      - device_tracker
      - event

# Media sources - expose local media folders to Media dashboard
media_source: {}

# Shell commands
shell_command:
  cleanup_old_photos: 'find /config/www/pets -name "*.jpg" -mtime +30 -delete && find /config/www/intruders -name "*.jpg" -mtime +30 -delete'
