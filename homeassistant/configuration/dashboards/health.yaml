views:
  - title: Health
    path: health
    icon: mdi:heart-pulse
    cards:
      # ── Heart Rate ──
      - type: heading
        heading: Heart Rate
        heading_style: title

      - type: horizontal-stack
        cards:
          - type: entity
            entity: sensor.pixel_9_pro_xl_heart_rate
            name: Heart Rate
            icon: mdi:heart-pulse
          - type: entity
            entity: sensor.alex_m_resting_heart_rate
            name: Resting HR
            icon: mdi:heart
          - type: entity
            entity: sensor.pixel_9_pro_xl_heart_rate_variability
            name: HRV
            icon: mdi:heart-flash

      - type: history-graph
        entities:
          - entity: sensor.pixel_9_pro_xl_heart_rate
            name: Heart Rate
          - entity: sensor.alex_m_resting_heart_rate
            name: Resting HR
        hours_to_show: 24

      - type: history-graph
        entities:
          - entity: sensor.pixel_9_pro_xl_heart_rate_variability
            name: HRV
        hours_to_show: 168

      # ── Activity ──
      - type: heading
        heading: Activity
        heading_style: title

      - type: horizontal-stack
        cards:
          - type: entity
            entity: sensor.alex_m_steps
            name: Steps
            icon: mdi:shoe-print
          - type: entity
            entity: sensor.alex_m_distance
            name: Distance
            icon: mdi:map-marker-distance
          - type: entity
            entity: sensor.alex_m_activity_calories
            name: Active Cal
            icon: mdi:fire
          - type: entity
            entity: sensor.alex_m_floors
            name: Floors
            icon: mdi:stairs-up

      - type: history-graph
        entities:
          - entity: sensor.alex_m_steps
            name: Steps
        hours_to_show: 168

      - type: horizontal-stack
        cards:
          - type: entity
            entity: sensor.alex_m_minutes_very_active
            name: Very Active
            icon: mdi:run-fast
          - type: entity
            entity: sensor.alex_m_minutes_fairly_active
            name: Fairly Active
            icon: mdi:run
          - type: entity
            entity: sensor.alex_m_minutes_lightly_active
            name: Lightly Active
            icon: mdi:walk
          - type: entity
            entity: sensor.alex_m_minutes_sedentary
            name: Sedentary
            icon: mdi:seat

      - type: history-graph
        entities:
          - entity: sensor.alex_m_activity_calories
            name: Active Calories
          - entity: sensor.alex_m_calories
            name: Total Calories
        hours_to_show: 168

      - type: entity
        entity: sensor.pixel_9_pro_xl_detected_activity
        name: Current Activity
        icon: mdi:run

      # ── Nutrition / Hydration ──
      - type: heading
        heading: Nutrition
        heading_style: title

      - type: horizontal-stack
        cards:
          - type: entity
            entity: sensor.alex_m_calories_in
            name: Calories In
            icon: mdi:food-apple
          - type: entity
            entity: sensor.alex_m_water
            name: Water
            icon: mdi:cup-water

      # ── Devices ──
      - type: heading
        heading: Devices
        heading_style: title

      - type: horizontal-stack
        cards:
          - type: entity
            entity: sensor.pixel_9_pro_xl_battery_level
            name: Phone
            icon: mdi:cellphone
          - type: entity
            entity: sensor.google_pixel_watch_3_battery_level
            name: Watch
            icon: mdi:watch
