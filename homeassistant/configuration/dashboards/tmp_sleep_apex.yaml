views:
  - title: Sleep (apex)
    path: tmp-sleep-apex
    icon: mdi:sleep
    cards:
      # ── Last Night ──
      - type: heading
        heading: Last Night
        heading_style: title

      - type: horizontal-stack
        cards:
          - type: entity
            entity: sensor.alex_m_sleep_minutes_asleep
            name: Asleep
            icon: mdi:sleep
          - type: entity
            entity: sensor.alex_m_sleep_efficiency
            name: Efficiency
            icon: mdi:percent-circle
          - type: entity
            entity: sensor.alex_m_sleep_start_time
            name: Bedtime
            icon: mdi:bed-clock
          - type: entity
            entity: sensor.alex_m_awakenings_count
            name: Awakenings
            icon: mdi:eye-open

      - type: horizontal-stack
        cards:
          - type: entity
            entity: sensor.alex_m_sleep_time_in_bed
            name: Time in Bed
            icon: mdi:bed
          - type: entity
            entity: sensor.alex_m_sleep_minutes_awake
            name: Awake
            icon: mdi:eye-outline
          - type: entity
            entity: sensor.alex_m_sleep_minutes_to_fall_asleep
            name: Fell Asleep
            icon: mdi:timer-sand
          - type: entity
            entity: sensor.alex_m_minutes_after_wakeup
            name: After Wakeup
            icon: mdi:weather-sunset-up

      # ── Sleep Stages ──
      - type: heading
        heading: Sleep Stages
        heading_style: subtitle

      - type: entity
        entity: sensor.pixel_9_pro_xl_sleep_segment
        name: Current Sleep Stage
        icon: mdi:sleep

      # ── Trends ──
      - type: heading
        heading: Trends
        heading_style: title

      - type: custom:apexcharts-card
        header:
          title: Sleep Duration
          show: true
        graph_span: 7d
        series:
          - entity: sensor.alex_m_sleep_minutes_asleep
            name: Minutes Asleep
            color: "#3498db"
            type: column
            group_by:
              func: max
              duration: 1d

      - type: custom:apexcharts-card
        header:
          title: Sleep Efficiency
          show: true
        graph_span: 7d
        yaxis:
          - min: 0
            max: 100
        series:
          - entity: sensor.alex_m_sleep_efficiency
            name: Efficiency %
            color: "#2ecc71"
            stroke_width: 2

      # ── Night Vitals ──
      - type: heading
        heading: Night Vitals
        heading_style: title

      - type: custom:apexcharts-card
        header:
          title: Night Heart Rate
          show: true
        graph_span: 12h
        series:
          - entity: sensor.pixel_9_pro_xl_heart_rate
            name: Heart Rate
            color: "#e74c3c"
            stroke_width: 2

      - type: custom:apexcharts-card
        header:
          title: HRV (higher = better recovery)
          show: true
        graph_span: 7d
        series:
          - entity: sensor.pixel_9_pro_xl_heart_rate_variability
            name: HRV
            color: "#9b59b6"
            stroke_width: 2
