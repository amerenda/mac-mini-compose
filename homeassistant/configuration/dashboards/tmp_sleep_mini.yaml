views:
  - title: Sleep (mini-graph)
    path: tmp-sleep-mini
    icon: mdi:sleep
    cards:
      # ── Last Night ──
      - type: heading
        heading: Last Night
        heading_style: title

      - type: horizontal-stack
        cards:
          - type: entity
            entity: sensor.alex_m_sleep_minutes_asleep
            name: Asleep
            icon: mdi:sleep
          - type: entity
            entity: sensor.alex_m_sleep_efficiency
            name: Efficiency
            icon: mdi:percent-circle
          - type: entity
            entity: sensor.alex_m_sleep_start_time
            name: Bedtime
            icon: mdi:bed-clock
          - type: entity
            entity: sensor.alex_m_awakenings_count
            name: Awakenings
            icon: mdi:eye-open

      - type: horizontal-stack
        cards:
          - type: entity
            entity: sensor.alex_m_sleep_time_in_bed
            name: Time in Bed
            icon: mdi:bed
          - type: entity
            entity: sensor.alex_m_sleep_minutes_awake
            name: Awake
            icon: mdi:eye-outline
          - type: entity
            entity: sensor.alex_m_sleep_minutes_to_fall_asleep
            name: Fell Asleep
            icon: mdi:timer-sand
          - type: entity
            entity: sensor.alex_m_minutes_after_wakeup
            name: After Wakeup
            icon: mdi:weather-sunset-up

      # ── Sleep Stages ──
      - type: heading
        heading: Sleep Stages
        heading_style: subtitle

      - type: entity
        entity: sensor.pixel_9_pro_xl_sleep_segment
        name: Current Sleep Stage
        icon: mdi:sleep

      # ── Trends ──
      - type: heading
        heading: Trends
        heading_style: title

      - type: "custom:mini-graph-card"
        entities:
          - entity: sensor.alex_m_sleep_minutes_asleep
            name: Minutes Asleep
            color: "#3498db"
        hours_to_show: 168
        points_per_hour: 0.5
        line_width: 2
        show:
          labels: true
          points: false

      - type: "custom:mini-graph-card"
        entities:
          - entity: sensor.alex_m_sleep_efficiency
            name: Sleep Efficiency %
            color: "#2ecc71"
        hours_to_show: 168
        points_per_hour: 0.5
        line_width: 2
        show:
          labels: true
          points: false

      # ── Night Vitals ──
      - type: heading
        heading: Night Vitals
        heading_style: title

      - type: "custom:mini-graph-card"
        entities:
          - entity: sensor.pixel_9_pro_xl_heart_rate
            name: Heart Rate
            color: "#e74c3c"
        hours_to_show: 12
        points_per_hour: 4
        line_width: 2
        show:
          labels: true
          points: false

      - type: "custom:mini-graph-card"
        entities:
          - entity: sensor.pixel_9_pro_xl_heart_rate_variability
            name: HRV
            color: "#9b59b6"
        hours_to_show: 168
        points_per_hour: 1
        line_width: 2
        show:
          labels: true
          points: false
