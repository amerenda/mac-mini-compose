              name: Override Active

      # ── Room Settings: Kitchen ─────────────────────────────
      - type: conditional
        conditions:
          - entity: input_select.sl_room_selector
            state: "Kitchen"
        card:
          type: entities
          title: Kitchen
          icon: mdi:stove
          show_header_toggle: false
          entities:
            - type: section
              label: Motion Triggers
            - entity: input_boolean.sl_kitchen_motion_morning
              name: Morning
            - entity: input_boolean.sl_kitchen_motion_day
              name: Day
            - entity: input_boolean.sl_kitchen_motion_evening
              name: Evening
            - entity: input_boolean.sl_kitchen_motion_night
              name: Night
            - type: section
              label: Settings
            - entity: input_number.sl_kitchen_motion_timeout
              name: Motion Timeout (min)
            - entity: input_boolean.sl_kitchen_auto_transition
