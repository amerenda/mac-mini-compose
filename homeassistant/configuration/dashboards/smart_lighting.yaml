                  icon: mdi:weather-night
                  show_state: false
                  tap_action:
                    action: call-service
                    service: scene.turn_on
                    target:
                      entity_id: scene.bedroom_night

      # ── Bathroom (Ambiance) ────────────────────────────────
      - type: conditional
        conditions:
          - entity: input_select.sl_room_selector
            state: "Bathroom"
        card:
          type: vertical-stack
          cards:
