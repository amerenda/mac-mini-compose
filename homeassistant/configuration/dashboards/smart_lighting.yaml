                - entity: input_boolean.sl_bathroom_override_scenes
                  state: "on"
              row:
                entity: input_select.sl_bathroom_evening_scene
                name: Evening Scene
            - type: conditional
              conditions:
                - entity: input_boolean.sl_bathroom_override_scenes
                  state: "on"
              row:
                entity: input_select.sl_bathroom_night_scene
                name: Night Scene

