  # Z2M Sync Tab
  # ════════════════════════════════════════════════════════════
  - title: Z2M Sync
    path: sync
    icon: mdi:sync
    cards:
      - type: entities
        title: Sync Status
        show_header_toggle: false
        entities:
          - entity: sensor.sl_z2m_sync_status
            name: Status
      - type: markdown
        content: >
          {% set sync = state_attr('sensor.sl_z2m_sync_status', 'last_sync') %}
          {% set hash = state_attr('sensor.sl_z2m_sync_status', 'config_hash') %}
          {% set window = state_attr('sensor.sl_z2m_sync_status', 'current_window') %}
          {% set has_config = state_attr('sensor.sl_z2m_sync_status', 'has_config') %}
          | | |
          |---|---|
