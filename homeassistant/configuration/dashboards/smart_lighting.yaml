title: Smart Lighting
views:
  - title: Controls
    path: schedule
    icon: mdi:lightbulb-auto
    cards:
      # ── Top Bar ────────────────────────────────────────────
      - type: entities
        entities:
          - entity: input_boolean.sl_enabled
            name: Smart Lighting
          - entity: sensor.sl_current_window
            name: Current Window
          - entity: input_select.sl_house_mode
            name: House Mode
          - entity: sensor.sl_z2m_sync_status
            name: Z2M Sync

      # ── Schedule (collapsible) ─────────────────────────────
      - type: entities
        entities:
          - entity: input_boolean.sl_show_schedule
            name: Edit Schedule
            icon: mdi:clock-edit-outline

      - type: conditional
        conditions:
          - entity: input_boolean.sl_show_schedule
            state: "on"
        card:
          type: vertical-stack
          cards:
            # Day → Profile assignment
            - type: entities
              title: Day Profiles
              show_header_toggle: false
              entities:
                - entity: input_select.sl_profile_monday
                  name: Monday
                - entity: input_select.sl_profile_tuesday
                  name: Tuesday
                - entity: input_select.sl_profile_wednesday
                  name: Wednesday
                - entity: input_select.sl_profile_thursday
                  name: Thursday
                - entity: input_select.sl_profile_friday
                  name: Friday
                - entity: input_select.sl_profile_saturday
                  name: Saturday
                - entity: input_select.sl_profile_sunday
                  name: Sunday
            # Profile schedules
            - type: entities
              title: "Weekday Profile"
              show_header_toggle: false
              entities:
                - entity: input_datetime.sl_morning_start_weekday
                  name: Morning
                - entity: input_datetime.sl_day_start_weekday
                  name: Day
                - entity: input_datetime.sl_evening_start_weekday
                  name: Evening
                - entity: input_datetime.sl_night_start_weekday
                  name: Night
            - type: entities
              title: "Friday Profile"
              show_header_toggle: false
              entities:
                - entity: input_datetime.sl_morning_start_friday
                  name: Morning
                - entity: input_datetime.sl_day_start_friday
                  name: Day
                - entity: input_datetime.sl_evening_start_friday
                  name: Evening
                - entity: input_datetime.sl_night_start_friday
                  name: Night
            - type: entities
              title: "Saturday Profile"
              show_header_toggle: false
              entities:
                - entity: input_datetime.sl_morning_start_saturday
                  name: Morning
                - entity: input_datetime.sl_day_start_saturday
                  name: Day
                - entity: input_datetime.sl_evening_start_saturday
                  name: Evening
                - entity: input_datetime.sl_night_start_saturday
                  name: Night
            - type: entities
              title: "Sunday Profile"
              show_header_toggle: false
              entities:
                - entity: input_datetime.sl_morning_start_sunday
                  name: Morning
                - entity: input_datetime.sl_day_start_sunday
                  name: Day
                - entity: input_datetime.sl_evening_start_sunday
                  name: Evening
                - entity: input_datetime.sl_night_start_sunday
                  name: Night

      # ── Room Selector ──────────────────────────────────────
      - type: entities
        title: Room Settings
        entities:
          - entity: input_select.sl_room_selector
            name: Room

      # ── Room Settings: Bathroom ────────────────────────────
      - type: conditional
        conditions:
          - entity: input_select.sl_room_selector
            state: "Bathroom"
        card:
          type: entities
          show_header_toggle: false
          entities:
            - type: section
              label: Motion Triggers
            - entity: input_boolean.sl_bathroom_motion_morning
              name: Morning
            - entity: input_boolean.sl_bathroom_motion_day
              name: Day
            - entity: input_boolean.sl_bathroom_motion_evening
              name: Evening
            - entity: input_boolean.sl_bathroom_motion_night
              name: Night
            - type: section
              label: Settings
            - entity: input_boolean.sl_bathroom_smart_power_on
              name: Smart Wall Switch
            - entity: input_number.sl_bathroom_motion_timeout
              name: Motion Timeout (min)
            - entity: input_boolean.sl_bathroom_auto_transition
              name: Auto Transition
            - entity: input_boolean.sl_bathroom_smooth_transition
              name: Smooth Transition
            - entity: input_number.sl_bathroom_smooth_transition_duration
              name: Transition Duration (min)
            - entity: input_boolean.sl_bathroom_override
              name: Override Active
            - type: section
              label: Scene Overrides
            - entity: input_boolean.sl_bathroom_override_scenes
              name: Override Window Scenes
            - type: conditional
              conditions:
                - entity: input_boolean.sl_bathroom_override_scenes
                  state: "on"
              row:
                entity: input_select.sl_bathroom_morning_scene
                name: Morning Scene
            - type: conditional
              conditions:
                - entity: input_boolean.sl_bathroom_override_scenes
                  state: "on"
              row:
                entity: input_select.sl_bathroom_day_scene
                name: Day Scene
            - type: conditional
              conditions:
                - entity: input_boolean.sl_bathroom_override_scenes
                  state: "on"
              row:
