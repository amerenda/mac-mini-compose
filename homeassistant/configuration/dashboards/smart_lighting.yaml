title: Smart Lighting
views:
  - title: Smart Lighting
    path: schedule
    icon: mdi:lightbulb-auto
    cards:
      # ── Top Bar ────────────────────────────────────────────
      - type: entities
        entities:
          - entity: input_boolean.sl_enabled
            name: Smart Lighting
          - entity: sensor.sl_current_window
            name: Current Window
          - entity: input_select.sl_house_mode
            name: House Mode

      # ── Schedule (collapsible) ─────────────────────────────
      - type: entities
        entities:
          - entity: input_boolean.sl_show_schedule
            name: Edit Schedule
            icon: mdi:clock-edit-outline

      - type: conditional
        conditions:
          - entity: input_boolean.sl_show_schedule
            state: "on"
        card:
          type: vertical-stack
          cards:
            - type: entities
              title: Weekday Schedule
              entities:
                - entity: input_datetime.sl_morning_start_weekday
                  name: Morning
                - entity: input_datetime.sl_day_start_weekday
                  name: Day
                - entity: input_datetime.sl_evening_start_weekday
                  name: Evening
                - entity: input_datetime.sl_night_start_weekday
                  name: Night
            - type: entities
              title: Weekend Schedule
              entities:
                - entity: input_datetime.sl_morning_start_weekend
                  name: Morning
                - entity: input_datetime.sl_day_start_weekend
                  name: Day
                - entity: input_datetime.sl_evening_start_weekend
                  name: Evening
                - entity: input_datetime.sl_night_start_weekend
                  name: Night

      # ── Weekend Days (collapsible) ─────────────────────────
      - type: entities
        entities:
          - entity: input_boolean.sl_show_weekend_config
            name: Configure Weekend Days
            icon: mdi:calendar-weekend

      - type: conditional
        conditions:
          - entity: input_boolean.sl_show_weekend_config
            state: "on"
        card:
          type: entities
          entities:
            - entity: input_boolean.sl_weekend_monday
              name: Monday
            - entity: input_boolean.sl_weekend_tuesday
              name: Tuesday
            - entity: input_boolean.sl_weekend_wednesday
              name: Wednesday
            - entity: input_boolean.sl_weekend_thursday
              name: Thursday
            - entity: input_boolean.sl_weekend_friday
              name: Friday
            - entity: input_boolean.sl_weekend_saturday
              name: Saturday
            - entity: input_boolean.sl_weekend_sunday
              name: Sunday

      # ── Room Selector ──────────────────────────────────────
      - type: entities
        title: Room Settings
        entities:
          - entity: input_select.sl_room_selector
            name: Room

      # ── Room Settings: Bathroom ────────────────────────────
      - type: conditional
        conditions:
          - entity: input_select.sl_room_selector
            state: "Bathroom"
        card:
          type: entities
          show_header_toggle: false
          entities:
            - type: section
              label: Motion Triggers
            - entity: input_boolean.sl_bathroom_motion_morning
              name: Morning
            - entity: input_boolean.sl_bathroom_motion_day
              name: Day
            - entity: input_boolean.sl_bathroom_motion_evening
              name: Evening
            - entity: input_boolean.sl_bathroom_motion_night
              name: Night
            - type: section
              label: Settings
            - entity: input_number.sl_bathroom_motion_timeout
              name: Motion Timeout (min)
            - entity: input_boolean.sl_bathroom_auto_transition
              name: Auto Transition
            - entity: input_boolean.sl_bathroom_smooth_transition
              name: Smooth Transition
            - entity: input_boolean.sl_bathroom_override
              name: Override Active

      # ── Room Settings: Bedroom ─────────────────────────────
