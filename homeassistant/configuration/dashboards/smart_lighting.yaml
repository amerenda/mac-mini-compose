  # ════════════════════════════════════════════════════════════
  # Scene Editor Tab
  # ════════════════════════════════════════════════════════════
  - title: Scene Editor
    path: scenes
    icon: mdi:palette
    cards:
      - type: entities
        show_header_toggle: false
        entities:
          - entity: input_select.sl_room_selector
            name: Room

      # ── Living Room ─────────────────────────────────────────
      - type: conditional
        conditions:
          - entity: input_select.sl_room_selector
            state: "Living Room"
        card:
          type: vertical-stack
          cards:
            - type: custom:hue-like-light-card
              entity: light.living_room_1
              title: Light
              slider: default
              onClickAction: hue-screen
              offClickAction: hue-screen
            - type: horizontal-stack
              cards:
                - type: button
                  name: Morning
                  icon: mdi:weather-sunset-up
                  show_state: false
                  tap_action:
                    action: call-service
                    service: scene.turn_on
                    target:
                      entity_id: scene.living_room_morning
                - type: button
                  name: Day
                  icon: mdi:weather-sunny
                  show_state: false
                  tap_action:
                    action: call-service
                    service: scene.turn_on
                    target:
                      entity_id: scene.living_room_day
                - type: button
                  name: Evening
                  icon: mdi:weather-sunset-down
                  show_state: false
                  tap_action:
                    action: call-service
                    service: scene.turn_on
                    target:
                      entity_id: scene.living_room_evening
                - type: button
                  name: Night
                  icon: mdi:weather-night
                  show_state: false
                  tap_action:
                    action: call-service
                    service: scene.turn_on
                    target:
                      entity_id: scene.living_room_night
            - type: custom:mushroom-title-card
              title: Save Current State
            - type: horizontal-stack
              cards:
                - type: button
                  name: As Morning
                  icon: mdi:content-save
                  show_state: false
                  tap_action:
                    action: call-service
                    service: script.sl_save_scene
                    data:
                      room: living_room
                      window: morning
                - type: button
                  name: As Day
                  icon: mdi:content-save
                  show_state: false
                  tap_action:
                    action: call-service
                    service: script.sl_save_scene
                    data:
                      room: living_room
                      window: day
                - type: button
                  name: As Evening
                  icon: mdi:content-save
                  show_state: false
                  tap_action:
                    action: call-service
                    service: script.sl_save_scene
                    data:
                      room: living_room
                      window: evening
                - type: button
                  name: As Night
                  icon: mdi:content-save
                  show_state: false
                  tap_action:
                    action: call-service
                    service: script.sl_save_scene
                    data:
                      room: living_room
                      window: night
            - type: entities
              show_header_toggle: false
              entities:
                - entity: input_text.sl_custom_scene_name
                  name: Custom Name
            - type: button
              name: Save as Custom
              icon: mdi:creation
              show_state: false
              tap_action:
                action: call-service
                service: script.sl_save_scene
                data:
                  room: living_room
                  window: "{{ states('input_text.sl_custom_scene_name') | lower | replace(' ', '_') }}"

