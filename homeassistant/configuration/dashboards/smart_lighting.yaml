  # ════════════════════════════════════════════════════════════
  # Scene Editor Tab
  # ════════════════════════════════════════════════════════════
  - title: Scene Editor
    path: scenes
    icon: mdi:palette
    cards:
      # ── Ambiance Defaults ───────────────────────────────────
      - type: vertical-stack
        cards:
          - type: custom:mushroom-title-card
            title: Ambiance Defaults
            subtitle: Color temperature lights
          - type: horizontal-stack
            cards:
              - type: custom:mushroom-number-card
                entity: input_number.sl_default_ambiance_morning_brightness
                name: Morning
                icon: mdi:weather-sunset-up
                layout: vertical
              - type: custom:mushroom-number-card
                entity: input_number.sl_default_ambiance_morning_color_temp
                name: Temp
                icon: mdi:thermometer
                layout: vertical
                card_mod:
                  style: |
                    :host {
                      --slider-color: linear-gradient(to right, #f5e6c8, #ffa726);
                    }
          - type: horizontal-stack
            cards:
              - type: custom:mushroom-number-card
                entity: input_number.sl_default_ambiance_day_brightness
                name: Day
                icon: mdi:weather-sunny
                layout: vertical
              - type: custom:mushroom-number-card
                entity: input_number.sl_default_ambiance_day_color_temp
                name: Temp
                icon: mdi:thermometer
                layout: vertical
          - type: horizontal-stack
            cards:
              - type: custom:mushroom-number-card
                entity: input_number.sl_default_ambiance_evening_brightness
                name: Evening
                icon: mdi:weather-sunset-down
                layout: vertical
              - type: custom:mushroom-number-card
                entity: input_number.sl_default_ambiance_evening_color_temp
                name: Temp
                icon: mdi:thermometer
                layout: vertical
          - type: horizontal-stack
            cards:
              - type: custom:mushroom-number-card
                entity: input_number.sl_default_ambiance_night_brightness
                name: Night
                icon: mdi:weather-night
                layout: vertical
              - type: custom:mushroom-number-card
                entity: input_number.sl_default_ambiance_night_color_temp
                name: Temp
                icon: mdi:thermometer
                layout: vertical

      # ── Dimmable Defaults ───────────────────────────────────
      - type: vertical-stack
        cards:
          - type: custom:mushroom-title-card
            title: Dimmable Defaults
            subtitle: Brightness-only lights
          - type: custom:mushroom-number-card
            entity: input_number.sl_default_dimmable_morning_brightness
            name: Morning
            icon: mdi:weather-sunset-up
          - type: custom:mushroom-number-card
            entity: input_number.sl_default_dimmable_day_brightness
            name: Day
            icon: mdi:weather-sunny
          - type: custom:mushroom-number-card
            entity: input_number.sl_default_dimmable_evening_brightness
            name: Evening
            icon: mdi:weather-sunset-down
          - type: custom:mushroom-number-card
            entity: input_number.sl_default_dimmable_night_brightness
            name: Night
            icon: mdi:weather-night

      - type: button
        name: Apply Defaults Now
        icon: mdi:refresh
        tap_action:
          action: call-service
          service: script.sl_rebuild_scenes

      # ── Room Scene Editor ───────────────────────────────────
      - type: custom:mushroom-title-card
        title: Room Scenes
        subtitle: Select a room to preview and customize

      - type: entities
        entities:
          - entity: input_select.sl_room_selector
            name: Room

      # ── Living Room (Ambiance) ──────────────────────────────
      - type: conditional
        conditions:
          - entity: input_select.sl_room_selector
            state: "Living Room"
        card:
          type: vertical-stack
          cards:
            - type: custom:mushroom-entity-card
              entity: input_boolean.sl_living_room_use_defaults
              name: Use Defaults
              icon: mdi:content-copy
              tap_action:
                action: toggle
            - type: custom:hue-like-light-card
              entity: light.living_room_1
              title: Living Room Light
              slider: default
            - type: horizontal-stack
              cards:
                - type: button
                  entity: scene.living_room_morning
                  name: Morning
                  icon: mdi:weather-sunset-up
                  show_state: false
                  tap_action:
                    action: call-service
                    service: scene.turn_on
                    target:
                      entity_id: scene.living_room_morning
                - type: button
                  entity: scene.living_room_day
                  name: Day
                  icon: mdi:weather-sunny
                  show_state: false
                  tap_action:
                    action: call-service
                    service: scene.turn_on
                    target:
                      entity_id: scene.living_room_day
                - type: button
                  entity: scene.living_room_evening
                  name: Evening
                  icon: mdi:weather-sunset-down
                  show_state: false
                  tap_action:
                    action: call-service
                    service: scene.turn_on
                    target:
                      entity_id: scene.living_room_evening
                - type: button
                  entity: scene.living_room_night
                  name: Night
                  icon: mdi:weather-night
                  show_state: false
                  tap_action:
                    action: call-service
                    service: scene.turn_on
                    target:
                      entity_id: scene.living_room_night

      # ── Bedroom (Ambiance) ─────────────────────────────────
