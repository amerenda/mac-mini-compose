              name: Morning
            - entity: input_boolean.sl_hallway_motion_day
              name: Day
            - entity: input_boolean.sl_hallway_motion_evening
              name: Evening
            - entity: input_boolean.sl_hallway_motion_night
              name: Night
            - type: section
