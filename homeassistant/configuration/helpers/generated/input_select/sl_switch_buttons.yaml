# Smart Lighting v2 — Per-room button action overrides
# "Default" uses the built-in behavior. Other options override.
# Actions available for each button:

_button_options: &button_options
  options:
    - Default
    - Toggle Room
    - Power Off Room
    - Power Off All
    - Brightness Up
    - Brightness Down
    - Brightness Max
    - Brightness Min
    - Cycle Scenes
    - Custom Scene
    - Do Nothing
  initial: Default
  icon: mdi:gesture-tap-button

# Living Room
sl_living_room_b1_short: { name: "SL: LR Button 1 Short", <<: *button_options }
sl_living_room_b1_long:  { name: "SL: LR Button 1 Long",  <<: *button_options }
