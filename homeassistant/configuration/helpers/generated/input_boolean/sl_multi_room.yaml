# Smart Lighting v2 — Multi-room config
# Per switch: which rooms to include when "Multi-Room Scene" action triggers
# The switch's own room is included by default (toggle off to exclude)

# Living Room switch includes:
sl_living_room_multi_living_room:
  name: "SL: LR Multi → Living Room"
  icon: mdi:sofa
sl_living_room_multi_bedroom:
  name: "SL: LR Multi → Bedroom"
  icon: mdi:bed
sl_living_room_multi_bathroom:
  name: "SL: LR Multi → Bathroom"
  icon: mdi:shower
sl_living_room_multi_kitchen:
  name: "SL: LR Multi → Kitchen"
  icon: mdi:silverware-fork-knife
sl_living_room_multi_hallway:
  name: "SL: LR Multi → Hallway"
  icon: mdi:door-open

