# Smart Lighting v2 — Global toggles

# Master toggle — enables/disables the entire v2 system
sl_enabled:
  name: "SL: Smart Lighting Enabled"
  icon: mdi:lightbulb-auto

# Weekend day configuration
sl_weekend_monday:
  name: "SL: Monday is Weekend"
