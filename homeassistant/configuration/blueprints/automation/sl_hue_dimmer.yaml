blueprint:
  name: "SL: Hue Dimmer Switch"
  description: >
    Configurable Hue dimmer switch (gen 2) automation for Smart Lighting v2.
    All 8 actions (4 buttons × short/long press) are configurable with sensible defaults.
  domain: automation
  input:
    switch_action_topic:
      name: Switch Action Topic
      description: "Z2M MQTT action topic (e.g., zigbee2mqtt/living_room_s_0/action)"
      selector:
        text:
    room:
      name: Room
      description: "Room identifier matching scene convention (e.g., living_room)"
      selector:
        text:
    light_entity:
      name: Light Entity
      description: "Light entity or Z2M group to control"
      selector:
        entity:
          domain: light
    switch_id:
      name: Switch Config ID
      description: "Unique ID for this switch's config helpers (defaults to room name)"
      default: ""
      selector:
        text:
    brightness_step_pct:
      name: Brightness Step (%)
      description: "How much brightness changes per button 2/3 short press"
      default: 20
      selector:
        number:
          min: 5
          max: 50
          unit_of_measurement: "%"
    min_brightness_pct:
      name: Minimum Brightness (%)
      description: "Brightness floor for button 3 long press"
      default: 20
      selector:
        number:
          min: 1
          max: 100
          unit_of_measurement: "%"
    button_4_long_press_scene:
      name: "Button 4 Long Press Scene"
      description: "Scene to activate on button 4 long press (leave empty for no action)"
      default: ""
      selector:
        text:

    # ── Overridable actions ──────────────────────────────────
    button_1_short:
      name: "Button 1 Short Press"
      description: "Default: toggle lights on (with scene) / off"
      default: []
      selector:
        action:
    button_1_long:
      name: "Button 1 Long Press"
      description: "Default: turn off all lights in room"
      default: []
      selector:
        action:
    button_2_short:
      name: "Button 2 Short Press"
      description: "Default: brightness up (+20%)"
      default: []
      selector:
        action:
    button_2_long:
      name: "Button 2 Long Press"
      description: "Default: brightness max"
      default: []
      selector:
        action:
    button_3_short:
      name: "Button 3 Short Press"
      description: "Default: brightness down (-20%)"
      default: []
      selector:
        action:
    button_3_long:
      name: "Button 3 Long Press"
      description: "Default: brightness minimum"
      default: []
      selector:
        action:
    button_4_short:
      name: "Button 4 Short Press"
      description: "Default: set current window scene, then cycle on repeat"
      default: []
      selector:
        action:
    button_4_long:
      name: "Button 4 Long Press"
      description: "Default: activate selected scene (if configured)"
      default: []
      selector:
        action:

trigger:
  - platform: mqtt
    topic: !input switch_action_topic

action:
  - variables:
      room: !input room
      light: !input light_entity
      switch_id_input: !input switch_id
      sid: "{{ switch_id_input if switch_id_input not in ['', 'unknown', 'unavailable'] else room }}"
      # Read config from helpers (dashboard-editable) with blueprint input as fallback
      brightness_step_pct_val: "{{ states('input_number.sl_' ~ sid ~ '_brightness_step') | float(0) }}"
      brightness_step_pct_fallback: !input brightness_step_pct
      min_brightness_pct_val: "{{ states('input_number.sl_' ~ sid ~ '_min_brightness') | float(0) }}"
      min_brightness_pct_fallback: !input min_brightness_pct
      brightness_step: "{{ ((brightness_step_pct_val if brightness_step_pct_val > 0 else brightness_step_pct_fallback) | float(20)) / 100 * 255 | int }}"
      min_brightness: "{{ ((min_brightness_pct_val if min_brightness_pct_val > 0 else min_brightness_pct_fallback) | float(20)) / 100 * 255 | int }}"
      b4_scene_helper: "{{ states('input_text.sl_' ~ sid ~ '_b4_scene') }}"
      b4_scene_input: !input button_4_long_press_scene
      b4_scene: "{{ b4_scene_helper if b4_scene_helper not in ['', 'unknown', 'unavailable'] else b4_scene_input }}"
      # Per-button action overrides from dashboard helpers
      b1s: "{{ states('input_select.sl_' ~ sid ~ '_b1_short') }}"
      b1l: "{{ states('input_select.sl_' ~ sid ~ '_b1_long') }}"
      b2s: "{{ states('input_select.sl_' ~ sid ~ '_b2_short') }}"
      b2l: "{{ states('input_select.sl_' ~ sid ~ '_b2_long') }}"
      b3s: "{{ states('input_select.sl_' ~ sid ~ '_b3_short') }}"
      b3l: "{{ states('input_select.sl_' ~ sid ~ '_b3_long') }}"
      b4s: "{{ states('input_select.sl_' ~ sid ~ '_b4_short') }}"
      b4l: "{{ states('input_select.sl_' ~ sid ~ '_b4_long') }}"

  - variables:
      # Map action string → payload for the choose below
      action_map:
        on_press_release: "{{ b1s }}"
        on_hold: "{{ b1l }}"
        up_press_release: "{{ b2s }}"
        up_hold: "{{ b2l }}"
        down_press_release: "{{ b3s }}"
        down_hold: "{{ b3l }}"
        off_press_release: "{{ b4s }}"
        off_hold: "{{ b4l }}"
      action: "{{ action_map.get(trigger.payload, 'Default') | default('Default') }}"

  - choose:
      # ── Do Nothing ──────────────────────────────────────
      - conditions:
          - condition: template
            value_template: "{{ action == 'Do Nothing' }}"
        sequence: []

      # ── Multi-Room Scene ────────────────────────────────
      - conditions:
          - condition: template
            value_template: "{{ action == 'Multi-Room Scene' }}"
        sequence:
          - variables:
              all_rooms:
                - living_room
                - bedroom
                - bathroom
                - kitchen
                - hallway
              target_rooms: >
                {{ all_rooms | select('in',
                    all_rooms | select('is_state', 'input_boolean.sl_' ~ room ~ '_multi_' ~ all_rooms, 'on')
                  ) | list }}
          - repeat:
              for_each: >
                {% set ns = namespace(rooms=[]) %}
                {% for r in ['living_room','bedroom','bathroom','kitchen','hallway'] %}
                  {% if is_state('input_boolean.sl_' ~ sid ~ '_multi_' ~ r, 'on') %}
                    {% set ns.rooms = ns.rooms + [r] %}
                  {% endif %}
                {% endfor %}
                {{ ns.rooms }}
              sequence:
                - service: script.sl_room_on
                  data:
                    room: "{{ repeat.item }}"

      # ── Toggle Room ─────────────────────────────────────
      - conditions:
          - condition: template
            value_template: "{{ action == 'Toggle Room' }}"
        sequence:
          - if:
              - condition: template
                value_template: "{{ is_state(light, 'on') }}"
            then:
              - service: script.sl_room_off
                data:
                  room: "{{ room }}"
            else:
              - service: script.sl_room_on
                data:
                  room: "{{ room }}"

      # ── Power Off Room ──────────────────────────────────
      - conditions:
          - condition: template
            value_template: "{{ action == 'Power Off Room' }}"
        sequence:
          - service: script.sl_room_off
            data:
              room: "{{ room }}"

      # ── Power Off All ───────────────────────────────────
      - conditions:
          - condition: template
            value_template: "{{ action == 'Power Off All' }}"
        sequence:
          - service: script.sl_toggle_all

      # ── Brightness Up ──────────────────────────────────
      - conditions:
          - condition: template
            value_template: "{{ action == 'Brightness Up' }}"
        sequence:
          - service: light.turn_on
            target:
              entity_id: "{{ light }}"
            data:
              brightness_step: "{{ brightness_step | int }}"
          - service: input_boolean.turn_on
            target:
              entity_id: "input_boolean.sl_{{ room }}_override"

      # ── Brightness Down ─────────────────────────────────
      - conditions:
          - condition: template
            value_template: "{{ action == 'Brightness Down' }}"
        sequence:
          - service: light.turn_on
            target:
              entity_id: "{{ light }}"
            data:
              brightness_step: "{{ -1 * brightness_step | int }}"
          - service: input_boolean.turn_on
            target:
              entity_id: "input_boolean.sl_{{ room }}_override"

      # ── Brightness Max ──────────────────────────────────
      - conditions:
          - condition: template
            value_template: "{{ action == 'Brightness Max' }}"
        sequence:
          - service: light.turn_on
            target:
              entity_id: "{{ light }}"
            data:
              brightness: 255
          - service: input_boolean.turn_on
            target:
              entity_id: "input_boolean.sl_{{ room }}_override"

      # ── Brightness Min ──────────────────────────────────
      - conditions:
          - condition: template
            value_template: "{{ action == 'Brightness Min' }}"
        sequence:
          - service: light.turn_on
            target:
              entity_id: "{{ light }}"
            data:
              brightness: "{{ min_brightness | int }}"
          - service: input_boolean.turn_on
            target:
              entity_id: "input_boolean.sl_{{ room }}_override"

      # ── Cycle Scenes ────────────────────────────────────
      - conditions:
          - condition: template
            value_template: "{{ action == 'Cycle Scenes' }}"
        sequence:
          - service: script.sl_cycle_scene
            data:
              room: "{{ room }}"

      # ── Custom Scene ────────────────────────────────────
      - conditions:
          - condition: template
            value_template: "{{ action == 'Custom Scene' }}"
        sequence:
          - if:
              - condition: template
                value_template: "{{ b4_scene not in ['', 'unknown', 'unavailable', 'none'] }}"
            then:
              - service: scene.turn_on
                target:
                  entity_id: "{{ b4_scene }}"

    # ── Default: use built-in behavior based on button ────
    default:
      - choose:
          # Button 1 Short: toggle
          - conditions:
              - condition: template
                value_template: "{{ trigger.payload == 'on_press_release' }}"
            sequence:
              - if:
                  - condition: template
                    value_template: "{{ is_state(light, 'on') }}"
                then:
                  - service: script.sl_room_off
                    data:
                      room: "{{ room }}"
                else:
                  - service: script.sl_room_on
                    data:
                      room: "{{ room }}"
          # Button 1 Long: power off room
          - conditions:
              - condition: template
                value_template: "{{ trigger.payload == 'on_hold' }}"
            sequence:
              - service: script.sl_room_off
                data:
                  room: "{{ room }}"
          # Button 2 Short: brightness up
          - conditions:
              - condition: template
                value_template: "{{ trigger.payload == 'up_press_release' }}"
            sequence:
              - service: light.turn_on
                target:
                  entity_id: "{{ light }}"
                data:
                  brightness_step: "{{ brightness_step | int }}"
              - service: input_boolean.turn_on
                target:
                  entity_id: "input_boolean.sl_{{ room }}_override"
          # Button 2 Long: brightness max
          - conditions:
              - condition: template
                value_template: "{{ trigger.payload == 'up_hold' }}"
            sequence:
              - service: light.turn_on
                target:
                  entity_id: "{{ light }}"
                data:
                  brightness: 255
              - service: input_boolean.turn_on
                target:
                  entity_id: "input_boolean.sl_{{ room }}_override"
          # Button 3 Short: brightness down
          - conditions:
              - condition: template
                value_template: "{{ trigger.payload == 'down_press_release' }}"
            sequence:
              - service: light.turn_on
                target:
                  entity_id: "{{ light }}"
                data:
                  brightness_step: "{{ -1 * brightness_step | int }}"
              - service: input_boolean.turn_on
                target:
                  entity_id: "input_boolean.sl_{{ room }}_override"
          # Button 3 Long: brightness min
          - conditions:
              - condition: template
                value_template: "{{ trigger.payload == 'down_hold' }}"
            sequence:
              - service: light.turn_on
                target:
                  entity_id: "{{ light }}"
                data:
                  brightness: "{{ min_brightness | int }}"
              - service: input_boolean.turn_on
                target:
                  entity_id: "input_boolean.sl_{{ room }}_override"
          # Button 4 Short: cycle scenes
          - conditions:
              - condition: template
                value_template: "{{ trigger.payload == 'off_press_release' }}"
            sequence:
              - service: script.sl_cycle_scene
                data:
                  room: "{{ room }}"
          # Button 4 Long: custom scene
          - conditions:
              - condition: template
                value_template: "{{ trigger.payload == 'off_hold' }}"
            sequence:
              - if:
                  - condition: template
                    value_template: "{{ b4_scene not in ['', 'unknown', 'unavailable', 'none'] }}"
                then:
                  - service: scene.turn_on
                    target:
                      entity_id: "{{ b4_scene }}"

mode: single
max_exceeded: silent
