blueprint:
  name: "Room - Timer Control (apply scene at window transition)"
  description: >
    When the SL current window changes, apply the new scene to lights
    that are already on in this room (only if the per-room Auto Transition helper is on).
  domain: "automation"

  input:
    room_key:
      name: "Room Key"
      description: "Room identifier matching SL convention (e.g., living_room)"
      selector: { text: {} }

    target_lights:
      name: "Target lights (group or list)"
      selector: { target: { entity: { domain: "light" } } }

    auto_transition_toggle:
      name: "Auto transition enabled"
      description: "input_boolean.sl_<room>_auto_transition — when ON, apply scene at window boundaries"
      selector:
        entity:
          domain: input_boolean

mode: "restart"
max_exceeded: "silent"

variables:
  room: !input room_key
  light_entity: !input target_lights
  _light_id: >-
    {% if light_entity is mapping and 'entity_id' in light_entity %}
      {{ light_entity.entity_id }}
    {% else %}
      {{ light_entity }}
    {% endif %}

trigger:
  - platform: state
    entity_id: sensor.sl_current_window

condition:
  - condition: state
    entity_id: !input auto_transition_toggle
    state: "on"
  - condition: template
    value_template: "{{ is_state(_light_id, 'on') }}"

action:
  - service: script.sl_room_on
    data:
      room: "{{ room }}"
      is_window_transition: true
