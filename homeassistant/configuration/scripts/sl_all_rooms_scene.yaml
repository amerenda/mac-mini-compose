sl_all_rooms_scene:
  alias: "SL: Set All Rooms to Scene"
  description: "Activate a specific time window scene for all rooms"
  mode: single
  fields:
    window:
      description: "Time window: morning, day, evening, night"
      required: true
      selector:
        text:
  sequence:
    - repeat:
        for_each:
          - living_room
          - bedroom
          - bathroom
          - kitchen
          - hallway
        sequence:
          - variables:
              scene_entity: "scene.{{ repeat.item }}_{{ window }}"
          - service: scene.turn_on
            target:
              entity_id: "{{ scene_entity }}"
