sl_cycle_scene:
  alias: "SL: Cycle Scene"
  description: >
    First press: apply current window scene.
    Subsequent presses: cycle morning → day → evening → night → morning.
  mode: single
  fields:
    room:
      description: "Room identifier"
      required: true
      selector:
        text:
  sequence:
    - variables:
        windows:
          - morning
          - day
          - evening
          - night
        current_window: "{{ states('sensor.sl_current_window') }}"
        last_applied: "{{ states('input_text.sl_' ~ room ~ '_last_scene_window') }}"
        # First press (nothing tracked yet, or tracker was cleared): apply current window
        # Subsequent presses: cycle to next from last applied
        target_window: >
          {% if last_applied not in windows %}
            {{ current_window if current_window in windows else 'morning' }}
          {% else %}
            {{ windows[((windows.index(last_applied)) + 1) % 4] }}
          {% endif %}
        scene_entity: "scene.{{ room }}_{{ target_window }}"
        scene_exists: "{{ scene_entity in (states.scene | map(attribute='entity_id') | list) }}"
    - if:
        - condition: template
          value_template: "{{ scene_exists }}"
      then:
        - service: scene.turn_on
          target:
            entity_id: "{{ scene_entity }}"
        - service: input_text.set_value
          target:
            entity_id: "input_text.sl_{{ room }}_last_scene_window"
          data:
            value: "{{ target_window }}"
