commute_alert:
  alias: "Commute: Check Subway Status and Notify"
  description: "Checks N, Q, 4, 5 subway lines for delays and sends push notification"
  mode: single
  sequence:
    - variables:
        status: "{{ states('sensor.subway_status') }}"
        details: "{{ state_attr('sensor.subway_status', 'details') | default([]) }}"
        has_delays: "{{ status == 'Delays' and details | length > 0 }}"
    - choose:
        - conditions: "{{ has_delays }}"
          sequence:
            - service: notify.mobile_app_pixel_9_pro_xl
              data:
                title: "🚇 Commute Alert"
                message: >
                  {% for line in details %}{{ line }}
                  {% endfor %}
                data:
                  tag: "commute-alert"
                  importance: "high"
                  sticky: true
      default:
        - service: notify.mobile_app_pixel_9_pro_xl
          data:
            title: "🚇 Commute"
            message: "N, Q, 4, 5 — all running normally"
            data:
              tag: "commute-alert"
              importance: "default"
