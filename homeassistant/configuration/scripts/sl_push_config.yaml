sl_push_config:
  alias: "SL: Push Config to Z2M"
  description: "Reads schedule + scene helpers, publishes to zigbee2mqtt/sl/config (retained)"
  mode: single
  sequence:
    - variables:
        house_mode: "{{ states('input_select.sl_house_mode') }}"
        is_guest: "{{ house_mode == 'Guest' }}"
        config: >
          {% set profiles = {
            'weekday': {
              'morning': states('input_datetime.sl_morning_start_weekday')[:5],
              'day': states('input_datetime.sl_day_start_weekday')[:5],
              'evening': states('input_datetime.sl_evening_start_weekday')[:5],
              'night': states('input_datetime.sl_night_start_weekday')[:5]
            },
            'friday': {
              'morning': states('input_datetime.sl_morning_start_friday')[:5],
              'day': states('input_datetime.sl_day_start_friday')[:5],
              'evening': states('input_datetime.sl_evening_start_friday')[:5],
              'night': states('input_datetime.sl_night_start_friday')[:5]
            },
            'saturday': {
              'morning': states('input_datetime.sl_morning_start_saturday')[:5],
              'day': states('input_datetime.sl_day_start_saturday')[:5],
              'evening': states('input_datetime.sl_evening_start_saturday')[:5],
              'night': states('input_datetime.sl_night_start_saturday')[:5]
            },
            'sunday': {
              'morning': states('input_datetime.sl_morning_start_sunday')[:5],
              'day': states('input_datetime.sl_day_start_sunday')[:5],
              'evening': states('input_datetime.sl_evening_start_sunday')[:5],
              'night': states('input_datetime.sl_night_start_sunday')[:5]
            }
          } %}
          {% set day_assignments = {
            'monday': states('input_select.sl_profile_monday'),
            'tuesday': states('input_select.sl_profile_tuesday'),
            'wednesday': states('input_select.sl_profile_wednesday'),
            'thursday': states('input_select.sl_profile_thursday'),
            'friday': states('input_select.sl_profile_friday'),
            'saturday': states('input_select.sl_profile_saturday'),
            'sunday': states('input_select.sl_profile_sunday')
          } %}
          {% macro scene(room, window) %}
            {% set b = states('input_number.sl_' ~ room ~ '_' ~ window ~ '_brightness') | int(200) %}
            {% set ct = states('input_number.sl_' ~ room ~ '_' ~ window ~ '_color_temp') %}
            {% if ct not in ['unknown', 'unavailable', ''] %}
              {"brightness": {{ b }}, "color_temp": {{ ct | int(370) }}}
            {% else %}
              {"brightness": {{ b }}}
            {% endif %}
          {% endmacro %}
          {% macro room_config(room_key, room_name, lights) %}
            {% set spo = false if is_guest else is_state('input_boolean.sl_' ~ room_key ~ '_smart_power_on', 'on') %}
            {
              "lights": {{ lights | tojson }},
              "smart_power_on": {{ spo | tojson }},
              "scenes": {
                "morning": {{ scene(room_key, 'morning') | from_json | tojson }},
                "day": {{ scene(room_key, 'day') | from_json | tojson }},
                "evening": {{ scene(room_key, 'evening') | from_json | tojson }},
                "night": {{ scene(room_key, 'night') | from_json | tojson }}
              }
            }
          {% endmacro %}
          {% set rooms = {
            'Living Room': room_config('living_room', 'Living Room', ['living_room_1']) | from_json,
            'Bedroom': room_config('bedroom', 'Bedroom', ['bedroom_1', 'bedroom_2', 'lamp_1']) | from_json,
            'Bathroom': room_config('bathroom', 'Bathroom', ['bathroom_1']) | from_json,
            'Kitchen': room_config('kitchen', 'Kitchen', ['kitchen_1', 'kitchen_2']) | from_json,
            'Hallway': room_config('hallway', 'Hallway', ['hallway_1']) | from_json
          } %}
          {{ {'profiles': profiles, 'day_assignments': day_assignments, 'house_mode': house_mode, 'rooms': rooms} | tojson }}
    - service: mqtt.publish
      data:
        topic: "zigbee2mqtt/sl/config"
        payload: "{{ config }}"
        retain: true
