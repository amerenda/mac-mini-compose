set_bulb_defaults:
  alias: "Z2M: Save Current State as Firmware Default"
  description: "Reads current brightness/color_temp from lights in a room and writes as hue_power_on firmware defaults"
  mode: single
  fields:
    room:
      description: "Room identifier (e.g., living_room)"
      required: true
      selector:
        text:
  sequence:
    - variables:
        room_lights:
          living_room: ["living_room_1"]
          bedroom: ["bedroom_1", "bedroom_2", "lamp_1"]
          bathroom: ["bathroom_1"]
          kitchen: ["kitchen_1", "kitchen_2"]
          hallway: ["hallway_1"]
        lights: "{{ room_lights[room] | default([]) }}"
    - repeat:
        for_each: "{{ lights }}"
        sequence:
          - variables:
              light_entity: "light.{{ repeat.item }}"
              bri: "{{ state_attr(light_entity, 'brightness') | int(254) }}"
              ct: "{{ state_attr(light_entity, 'color_temp') | int(250) }}"
          - service: mqtt.publish
            data:
              topic: "zigbee2mqtt/{{ repeat.item }}/set"
              payload: "{{ {'hue_power_on_behavior': 'on', 'hue_power_on_brightness': bri | int, 'hue_power_on_color_temperature': ct | int} | tojson }}"
          - delay: { milliseconds: 300 }

set_all_bulb_defaults:
  alias: "Z2M: Save All Rooms Current State as Firmware Default"
  description: "Reads current state from ALL lights and writes as firmware defaults"
  mode: single
  sequence:
    - service: script.set_bulb_defaults
      data:
        room: living_room
    - service: script.set_bulb_defaults
      data:
        room: bedroom
    - service: script.set_bulb_defaults
      data:
        room: bathroom
    - service: script.set_bulb_defaults
      data:
        room: kitchen
    - service: script.set_bulb_defaults
      data:
        room: hallway
