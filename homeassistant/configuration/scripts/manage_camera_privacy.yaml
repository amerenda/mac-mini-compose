manage_camera_privacy:
  alias: "Manage Camera Privacy"
  description: "Cameras OFF (privacy ON) when Alex is home. Cameras ON (privacy OFF) when Alex is away. Eirill's presence does not affect camera state."
  sequence:
    - if:
        - condition: state
          entity_id: device_tracker.pixel_9_pro_xl_2
          state: "home"
      then:
        # Alex is home - Privacy ON (Cameras OFF)
        - action: light.turn_off
          target:
            entity_id:
              - light.bedroom_status_led
              - light.living_room_status_led
        - action: switch.turn_on
          target:
            entity_id:
              - switch.bedroom_privacy_mode
              - switch.living_room_privacy_mode
      else:
        # Alex is away - Privacy OFF (Cameras ON)
        - action: light.turn_on
          target:
            entity_id:
              - light.bedroom_status_led
              - light.living_room_status_led
        - action: switch.turn_off
          target:
            entity_id:
              - switch.bedroom_privacy_mode
              - switch.living_room_privacy_mode
