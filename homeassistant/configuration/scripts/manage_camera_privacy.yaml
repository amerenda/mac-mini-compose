manage_camera_privacy:
  alias: "Manage Camera Privacy"
  description: "Privacy ON (cameras + lights OFF) if anyone in group.members is home. Privacy OFF (cameras + lights ON) when everyone is away."
  sequence:
    - if:
        - condition: state
          entity_id: group.members
          state: "home"
      then:
        # Someone home - turn off LEDs first (privacy mode blocks LED control)
        - action: light.turn_off
          target:
            entity_id:
              - light.bedroom_status_led
              - light.living_room_status_led
        - delay: "00:00:02"
        - condition: state
          entity_id: light.bedroom_status_led
          state: "off"
        - action: switch.turn_on
          target:
            entity_id:
              - switch.bedroom_privacy_mode
              - switch.living_room_privacy_mode
      else:
        # Everyone away - disable privacy first, then turn on LEDs
        - action: switch.turn_off
          target:
            entity_id:
              - switch.bedroom_privacy_mode
              - switch.living_room_privacy_mode
        - delay: "00:00:02"
        - action: light.turn_on
          target:
            entity_id:
              - light.bedroom_status_led
              - light.living_room_status_led
