sl_apply_custom_scene_all_rooms:
  alias: "SL: Apply custom scene (all rooms)"
  description: >
    Activates one HA scene per room created by Save (All Rooms + custom name).
    Scene entity IDs are scene.slc_<room>_<slug>, e.g. scene.slc_living_room_movie_night.
    Dynamic scenes from scene.create last until Home Assistant restarts or reloads.
  mode: single
  fields:
    window:
      description: "Same slug used when saving (custom scene name, lower + underscores)"
      required: true
      selector:
        text:
  sequence:
    - repeat:
        for_each:
          - living_room
          - bedroom
          - bathroom
          - kitchen
          - hallway
        sequence:
          - variables:
              rid: "{{ repeat.item }}"
          - service: scene.turn_on
            target:
              entity_id: "scene.slc_{{ rid }}_{{ window }}"
