create_default_scenes:
  alias: "SL: Create Default Scenes"
  description: "Creates default morning/day/evening/night scenes for all rooms. Safe to re-run — overwrites with defaults. Edit scenes via UI afterwards."
  mode: single
  sequence:

    # ── Living Room (White + Color Ambiance) ─────────────────────────────────
    - service: scene.create
      data:
        scene_id: living_room_morning
        entities:
          light.living_room_1:
            state: "on"
            brightness: 180
            color_temp: 320
    - service: scene.create
      data:
        scene_id: living_room_day
        entities:
          light.living_room_1:
            state: "on"
            brightness: 254
            color_temp: 250
    - service: scene.create
      data:
        scene_id: living_room_evening
        entities:
          light.living_room_1:
            state: "on"
            brightness: 160
            color_temp: 380
    - service: scene.create
      data:
        scene_id: living_room_night
        entities:
          light.living_room_1:
            state: "on"
            brightness: 60
            color_temp: 454

    # ── Bedroom (White + Color Ambiance) ─────────────────────────────────────
    - service: scene.create
      data:
        scene_id: bedroom_morning
        entities:
          light.bedroom_1:
            state: "on"
            brightness: 180
            color_temp: 320
          light.bedroom_2:
            state: "on"
            brightness: 180
            color_temp: 320
          light.lamp_1:
            state: "on"
            brightness: 180
            color_temp: 320
    - service: scene.create
      data:
        scene_id: bedroom_day
        entities:
          light.bedroom_1:
            state: "on"
            brightness: 254
            color_temp: 250
          light.bedroom_2:
            state: "on"
            brightness: 254
            color_temp: 250
          light.lamp_1:
            state: "on"
            brightness: 254
            color_temp: 250
    - service: scene.create
      data:
        scene_id: bedroom_evening
        entities:
          light.bedroom_1:
            state: "on"
            brightness: 140
            color_temp: 400
          light.bedroom_2:
            state: "on"
            brightness: 140
            color_temp: 400
          light.lamp_1:
            state: "on"
            brightness: 140
            color_temp: 400
    - service: scene.create
      data:
        scene_id: bedroom_night
        entities:
          light.bedroom_1:
            state: "on"
            brightness: 40
            color_temp: 454
          light.bedroom_2:
            state: "on"
            brightness: 40
            color_temp: 454
          light.lamp_1:
            state: "on"
            brightness: 40
            color_temp: 454

    # ── Bathroom (White + Color Ambiance, 1100lm) ─────────────────────────────
    - service: scene.create
      data:
        scene_id: bathroom_morning
        entities:
          light.bathroom_1:
            state: "on"
            brightness: 200
            color_temp: 280
    - service: scene.create
      data:
        scene_id: bathroom_day
        entities:
          light.bathroom_1:
            state: "on"
            brightness: 254
            color_temp: 250
    - service: scene.create
      data:
        scene_id: bathroom_evening
        entities:
          light.bathroom_1:
            state: "on"
            brightness: 180
            color_temp: 350
    - service: scene.create
      data:
        scene_id: bathroom_night
        entities:
          light.bathroom_1:
            state: "on"
            brightness: 60
            color_temp: 454

    # ── Kitchen (White only) ──────────────────────────────────────────────────
    - service: scene.create
      data:
        scene_id: kitchen_morning
        entities:
          light.kitchen_1:
            state: "on"
            brightness: 200
          light.kitchen_2:
            state: "on"
            brightness: 200
    - service: scene.create
      data:
        scene_id: kitchen_day
        entities:
          light.kitchen_1:
            state: "on"
            brightness: 254
          light.kitchen_2:
            state: "on"
            brightness: 254
    - service: scene.create
      data:
        scene_id: kitchen_evening
        entities:
          light.kitchen_1:
            state: "on"
            brightness: 180
          light.kitchen_2:
            state: "on"
            brightness: 180
    - service: scene.create
      data:
        scene_id: kitchen_night
        entities:
          light.kitchen_1:
            state: "on"
            brightness: 80
          light.kitchen_2:
            state: "on"
            brightness: 80

    # ── Hallway (White only) ──────────────────────────────────────────────────
    - service: scene.create
      data:
        scene_id: hallway_morning
        entities:
          light.hallway_1:
            state: "on"
            brightness: 180
    - service: scene.create
      data:
        scene_id: hallway_day
        entities:
          light.hallway_1:
            state: "on"
            brightness: 254
    - service: scene.create
      data:
        scene_id: hallway_evening
        entities:
          light.hallway_1:
            state: "on"
            brightness: 140
    - service: scene.create
      data:
        scene_id: hallway_night
        entities:
          light.hallway_1:
            state: "on"
            brightness: 60
