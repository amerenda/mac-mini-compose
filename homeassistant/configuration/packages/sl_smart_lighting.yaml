# Smart Lighting v2 — Package
# Contains template sensors and any other cross-cutting config

template:
  - sensor:
      - name: "SL: Current Window"
        unique_id: sl_current_window
        icon: mdi:clock-time-four-outline
        state: >
          {% set day_names = ['monday','tuesday','wednesday','thursday','friday','saturday','sunday'] %}
          {% set today = day_names[now().weekday()] %}
          {% set is_weekend = is_state('input_boolean.sl_weekend_' ~ today, 'on') %}
          {% set suffix = 'weekend' if is_weekend else 'weekday' %}
          {% set morning = states('input_datetime.sl_morning_start_' ~ suffix) | default('06:00:00') %}
          {% set day = states('input_datetime.sl_day_start_' ~ suffix) | default('09:00:00') %}
          {% set evening = states('input_datetime.sl_evening_start_' ~ suffix) | default('17:00:00') %}
          {% set night = states('input_datetime.sl_night_start_' ~ suffix) | default('22:00:00') %}
          {% set t = now().strftime('%H:%M:%S') %}
          {% if morning <= t < day %}morning
          {% elif day <= t < evening %}day
          {% elif evening <= t < night %}evening
          {% else %}night{% endif %}
        attributes:
          day_type: >
            {% set day_names = ['monday','tuesday','wednesday','thursday','friday','saturday','sunday'] %}
            {% set today = day_names[now().weekday()] %}
            {{ 'weekend' if is_state('input_boolean.sl_weekend_' ~ today, 'on') else 'weekday' }}
          next_transition: >
            {% set day_names = ['monday','tuesday','wednesday','thursday','friday','saturday','sunday'] %}
            {% set today = day_names[now().weekday()] %}
            {% set is_weekend = is_state('input_boolean.sl_weekend_' ~ today, 'on') %}
            {% set suffix = 'weekend' if is_weekend else 'weekday' %}
            {% set times = {
              'morning': states('input_datetime.sl_morning_start_' ~ suffix),
              'day': states('input_datetime.sl_day_start_' ~ suffix),
              'evening': states('input_datetime.sl_evening_start_' ~ suffix),
              'night': states('input_datetime.sl_night_start_' ~ suffix)
            } %}
            {% set t = now().strftime('%H:%M:%S') %}
            {% set upcoming = times | dictsort(by='value') | selectattr('1', 'gt', t) | first | default(none) %}
            {{ upcoming[1] if upcoming else times.values() | sort | first }}
